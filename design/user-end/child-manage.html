<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>多孩管理 · DmkWords</title>
  <style>
    :root {
      --bg: oklch(98% 0.003 250); --surface: oklch(100% 0 0);
      --fg: oklch(20% 0.015 275); --muted: oklch(48% 0.02 250);
      --border: oklch(90% 0.008 250); --accent: oklch(54% 0.17 275);
      --accent-soft: oklch(54% 0.17 275 / 0.1);
      --secondary: oklch(86% 0.20 135); --secondary-soft: oklch(86% 0.20 135 / 0.12);
      --success: oklch(72% 0.20 145); --warning: oklch(78% 0.16 85);
      --radius: 16px; --radius-sm: 10px; --radius-lg: 20px;
      --font-display: 'PingFang SC', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--fg); font-family: var(--font-body);
      font-size: 15px; line-height: 1.5; max-width: 430px; margin: 0 auto;
      min-height: 100vh; padding-bottom: 100px; -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    .nav-bar {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-bar .back { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 10px; }
    .nav-bar .back svg { width: 20px; height: 20px; }
    .nav-bar .title { font-family: var(--font-display); font-size: 17px; font-weight: 600; }
    .section-title {
      font-family: var(--font-display); font-size: 15px; font-weight: 600;
      padding: 16px 16px 8px;
    }
    .child-card {
      margin: 0 16px 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; display: flex; align-items: center; gap: 14px;
      position: relative; cursor: pointer; transition: border-color 0.15s;
    }
    .child-card:active { border-color: var(--accent); }
    .child-card.current { border-color: var(--accent); border-width: 2px; }
    .child-avatar {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      display: grid; place-items: center; font-size: 24px;
    }
    .child-avatar.g1 { background: oklch(92% 0.08 275 / 0.2); }
    .child-avatar.g2 { background: oklch(92% 0.08 135 / 0.2); }
    .child-info { flex: 1; }
    .child-name { font-family: var(--font-display); font-size: 16px; font-weight: 600; }
    .child-meta { font-size: 13px; color: var(--muted); margin-top: 2px; display: flex; gap: 10px; }
    .child-level {
      padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
    }
    .level-g1 { background: var(--accent-soft); color: var(--accent); }
    .level-g2 { background: var(--secondary-soft); color: oklch(45% 0.15 135); }
    .current-tag {
      position: absolute; top: 12px; right: 14px;
      padding: 2px 8px; border-radius: 999px;
      background: var(--accent); color: white;
      font-size: 10px; font-weight: 600;
    }
    .child-stats {
      display: flex; gap: 12px; margin-top: 8px;
    }
    .child-stat {
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }
    .child-stat svg { width: 12px; height: 12px; }
    .add-btn-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px 28px; background: var(--surface);
      border-top: 1px solid var(--border);
      max-width: 430px; margin: 0 auto;
    }
    .add-btn {
      width: 100%; padding: 14px; border-radius: var(--radius);
      background: var(--accent); color: white;
      font-size: 15px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .add-btn:active { opacity: 0.85; }
    .add-btn svg { width: 18px; height: 18px; }
    .child-actions {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .child-action-btn {
      padding: 6px 14px; border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); color: var(--muted);
    }
    .child-action-btn:active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="nav-bar">
    <a class="back" href="member.html">

    </a>
    <div class="title">我的孩子</div>

    </div>
    <div class="child-actions">
      <a class="child-action-btn" href="reading-stats.html">阅读统计</a>

  <div class="child-card" onclick="location.href='my-books.html'">

        <span class="child-stat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
