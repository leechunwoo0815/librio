<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的书架 — DmkWords</title>
<style>
:root {
  --bg: oklch(98% 0.003 250);
  --surface: oklch(100% 0 0);
  --fg: oklch(20% 0.015 275);
  --muted: oklch(48% 0.02 250);
  --border: oklch(90% 0.008 250);
  --accent: oklch(54% 0.17 275);
  --accent-soft: oklch(54% 0.17 275 / 0.1);
  --secondary: oklch(86% 0.20 135);
  --secondary-soft: oklch(86% 0.20 135 / 0.12);
  --success: oklch(72% 0.20 145);
  --success-soft: oklch(72% 0.20 145 / 0.1);
  --warning: oklch(78% 0.16 85);
  --warning-soft: oklch(78% 0.16 85 / 0.1);
  --error: oklch(62% 0.22 25);
  --radius: 12px; --radius-sm: 8px; --radius-lg: 16px;
  --font-display: 'PingFang SC', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg);
  width: 375px;
  min-height: 100vh;
  margin: 0 auto;
  padding-bottom: 80px;
  -webkit-font-smoothing: antialiased;
}

/* Top Navigation */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 56px;
  padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.top-bar .back-btn {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  font-size: 20px;
  color: var(--fg);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: background 0.15s;
}
.top-bar .back-btn:active { background: var(--accent-soft); }
.top-bar h1 {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
}

/* Tab Bar (Category Tabs) */
.tab-bar {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
}
.tab-bar button {
  flex: 1;
  padding: 12px 0 10px;
  background: none;
  border: none;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}
.tab-bar button.active {
  color: var(--accent);
  font-weight: 600;
}
.tab-bar button.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 3px;
  background: var(--accent);
  border-radius: 3px 3px 0 0;
}
.tab-bar .tab-count {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  background: var(--accent-soft);
  border-radius: 10px;
  padding: 1px 6px;
  margin-left: 4px;
  vertical-align: middle;
}
.tab-bar button.active .tab-count {
  color: var(--accent);
}

/* Content Area */
.content {
  padding: 16px;
}

/* Book Grid */
.book-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* Book Card */
.book-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 12px 12px;
  box-shadow: 0 1px 3px oklch(20% 0.015 275 / 0.06);
  display: flex;
  flex-direction: column;
  transition: transform 0.15s, box-shadow 0.15s;
}
.book-card:active {
  transform: scale(0.98);
  box-shadow: 0 0.5px 1px oklch(20% 0.015 275 / 0.04);
}
.book-card .book-cover {
  width: 100%;
  aspect-ratio: 3 / 4;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  margin-bottom: 10px;
  position: relative;
}
.book-card .book-cover.cover-1 { background: linear-gradient(135deg, #e8dff5 0%, #d4c5f9 100%); }
.book-card .book-cover.cover-2 { background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%); }
.book-card .book-cover.cover-3 { background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%); }
.book-card .book-cover.cover-4 { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); }
.book-card .book-cover.cover-5 { background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); }
.book-card .book-cover.cover-6 { background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%); }
.book-card .book-cover.cover-add {
  background: var(--bg);
  border: 2px dashed var(--border);
  font-size: 28px;
  color: var(--muted);
}
.book-card .ar-badge {
  position: absolute;
  top: 6px;
  right: 6px;
  background: oklch(20% 0.015 275 / 0.7);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 6px;
  backdrop-filter: blur(4px);
}
.book-card .book-title {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 2px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.book-card .book-author {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
}
.book-card .expiry-info {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 3px;
}
.book-card .expiry-info.warning {
  color: var(--warning);
  font-weight: 500;
}
.book-card .expiry-info.urgent {
  color: var(--error);
  font-weight: 600;
}

/* Progress Bar */
.progress-wrap {
  margin-bottom: 10px;
}
.progress-wrap .progress-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 4px;
}
.progress-wrap .progress-label span:last-child {
  font-weight: 600;
  color: var(--accent);
}
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar .progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.6s ease;
}

/* Action Button */
.card-btn {
  width: 100%;
  padding: 8px 0;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.card-btn:active { transform: scale(0.97); }
.card-btn.primary {
  background: var(--accent);
  color: #fff;
}
.card-btn.secondary {
  background: var(--accent-soft);
  color: var(--accent);
}
.card-btn.success {
  background: var(--success-soft);
  color: var(--success);
}

/* Add Card */
.add-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 12px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 220px;
  box-shadow: 0 1px 3px oklch(20% 0.015 275 / 0.06);
  cursor: pointer;
  transition: transform 0.15s;
  border: 2px dashed var(--border);
}
.add-card:active { transform: scale(0.97); }
.add-card .add-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--accent-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: 8px;
}
.add-card .add-text {
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
}
.add-card.disabled {
  opacity: 0.4;
  cursor: not-allowed;
  border-color: var(--border);
}
.add-card.disabled .add-icon { background: var(--border); }
.add-card.disabled .add-text { color: var(--muted); }

/* Completed Card Extras */
.book-card .completed-info {
  margin-bottom: 8px;
}
.book-card .completed-info .finish-date {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 4px;
}
.book-card .completed-info .stats-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.book-card .completed-info .stat-badge {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 6px;
  border-radius: 6px;
}
.stat-badge.words {
  background: var(--accent-soft);
  color: var(--accent);
}
.stat-badge.quiz-pass {
  background: var(--success-soft);
  color: var(--success);
}
.stat-badge.quiz-fail {
  background: var(--warning-soft);
  color: var(--warning);
}
.book-card .checkmark {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--success);
  color: #fff;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}

/* Favorite Card */
.book-card .fav-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 11px;
  margin-top: 4px;
  color: var(--accent);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}
.empty-state .empty-emoji {
  font-size: 56px;
  margin-bottom: 16px;
}
.empty-state .empty-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
}
.empty-state .empty-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 20px;
}
.empty-state .empty-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

/* Bottom Tab Bar */
.bottom-tabs {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 375px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 6px 0 env(safe-area-inset-bottom, 8px);
  z-index: 200;
}
.bottom-tabs a {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 0;
  text-decoration: none;
  color: var(--muted);
  font-size: 10px;
  font-weight: 500;
  transition: color 0.15s;
}
.bottom-tabs a .tab-icon { font-size: 22px; }
.bottom-tabs a.active { color: var(--accent); }

/* Toast */
.toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: oklch(20% 0.015 275 / 0.88);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 20px;
  border-radius: var(--radius);
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  backdrop-filter: blur(8px);
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Section Header */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.section-header .count {
  font-size: 13px;
  color: var(--muted);
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">←</button>
  <h1>我的书架</h1>
</div>

<!-- Category Tabs -->
<div class="tab-bar">
  <button class="active" onclick="switchTab('reading', this)">
    正在阅读<span class="tab-count" id="count-reading">6</span>
  </button>
  <button onclick="switchTab('favorites', this)">
    收藏夹<span class="tab-count" id="count-favorites">3</span>
  </button>
  <button onclick="switchTab('completed', this)">
    已读完<span class="tab-count" id="count-completed">4</span>
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Content Panels -->
<div class="content">

  <!-- 正在阅读 Tab -->
  <div class="tab-panel" id="panel-reading">
    <div class="book-grid" id="grid-reading"></div>
  </div>

  <!-- 收藏夹 Tab -->
  <div class="tab-panel" id="panel-favorites" style="display:none">
    <div class="book-grid" id="grid-favorites"></div>
  </div>

  <!-- 已读完 Tab -->
  <div class="tab-panel" id="panel-completed" style="display:none">
    <div class="book-grid" id="grid-completed"></div>
  </div>

</div>

<!-- Bottom Tab Bar -->
<nav class="bottom-tabs">
  <a href="index.html">
    <span class="tab-icon">🏠</span>
    <span>首页</span>
  </a>
  <a href="books.html">
    <span class="tab-icon">📚</span>
    <span>图书馆</span>
  </a>
  <a href="shelf.html" class="active">
    <span class="tab-icon">📖</span>
    <span>书架</span>
  </a>
  <a href="member.html">
    <span class="tab-icon">👤</span>
    <span>我的</span>
  </a>
</nav>

<script>
const coverClasses = ['cover-1','cover-2','cover-3','cover-4','cover-5','cover-6'];

const readingBooks = [
  { title: "Charlotte's Web", author: "E.B. White", emoji: "🕷️", ar: 3.2, expiry: 12, progress: 65, cover: 0 },
  { title: "The Little Prince", author: "Antoine de Saint-Exupéry", emoji: "🌟", ar: 5.0, expiry: 8, progress: 42, cover: 1 },
  { title: "Matilda", author: "Roald Dahl", emoji: "📖", ar: 5.2, expiry: 3, progress: 78, cover: 2 },
  { title: "Diary of a Wimpy Kid", author: "Jeff Kinney", emoji: "📓", ar: 5.4, expiry: 18, progress: 23, cover: 3 },
  { title: "Wonder", author: "R.J. Palacio", emoji: "🦋", ar: 4.8, expiry: 5, progress: 91, cover: 4 },
  { title: "Harry Potter and the Sorcerer's Stone", author: "J.K. Rowling", emoji: "⚡", ar: 6.0, expiry: 21, progress: 15, cover: 5 },
];

const favoriteBooks = [
  { title: "Where the Wild Things Are", author: "Maurice Sendak", emoji: "👹", ar: 3.4, cover: 0 },
  { title: "Goodnight Moon", author: "Margaret Wise Brown", emoji: "🌙", ar: 1.8, cover: 1 },
  { title: "The Giving Tree", author: "Shel Silverstein", emoji: "🌳", ar: 2.6, cover: 2 },
];

const completedBooks = [
  { title: "Brown Bear, Brown Bear", author: "Bill Martin Jr.", emoji: "🐻", ar: 1.5, finished: "2026-06-10", words: 156, quizPass: true, cover: 3 },
  { title: "The Very Hungry Caterpillar", author: "Eric Carle", emoji: "🐛", ar: 2.9, finished: "2026-05-28", words: 234, quizPass: true, cover: 4 },
  { title: "Green Eggs and Ham", author: "Dr. Seuss", emoji: "🍳", ar: 2.1, finished: "2026-05-15", words: 312, quizPass: true, cover: 5 },
  { title: "Pete the Cat", author: "James Dean", emoji: "🐱", ar: 3.0, finished: "2026-04-20", words: 189, quizPass: false, cover: 0 },
];

const SHELF_LIMIT = 20;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.getElementById('panel-' + name).style.display = 'block';
}

function expiryClass(days) {
  if (days <= 3) return 'urgent';
  if (days < 7) return 'warning';
  return '';
}

function renderReading() {
  const grid = document.getElementById('grid-reading');
  let html = '';
  readingBooks.forEach((b, i) => {
    const ec = expiryClass(b.expiry);
    html += `
    <div class="book-card">
      <div class="book-cover ${coverClasses[b.cover]}">
        ${b.emoji}
        <span class="ar-badge">AR ${b.ar}</span>
      </div>
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>
      <div class="expiry-info ${ec}">
        ⏰ 还剩${b.expiry}天到期
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>阅读进度</span>
          <span>${b.progress}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${b.progress}%"></div>
        </div>
      </div>
      <button class="card-btn primary" onclick="showToast('正在打开 ${b.title}...')">继续阅读</button>
    </div>`;
  });

  // Add placeholder card
  const total = readingBooks.length;
  if (total < SHELF_LIMIT) {
    html += `
    <div class="add-card" onclick="showToast('跳转到图书馆添加书籍')">
      <div class="add-icon">＋</div>
      <div class="add-text">添加书籍</div>
    </div>`;
  } else {
    html += `
    <div class="add-card disabled" onclick="showToast('书架已满，请先完成阅读')">
      <div class="add-icon">＋</div>
      <div class="add-text">添加书籍</div>
    </div>`;
  }

  grid.innerHTML = html;
  document.getElementById('count-reading').textContent = total;
}

function renderFavorites() {
  const grid = document.getElementById('grid-favorites');
  if (favoriteBooks.length === 0) {
    grid.innerHTML = `
    <div class="empty-state" style="grid-column:1/-1">
      <div class="empty-emoji">💫</div>
      <div class="empty-title">还没有收藏的书</div>
      <div class="empty-desc">浏览图书馆，点击❤️把喜欢的书<br>加入收藏夹吧</div>
      <button class="empty-btn" onclick="location.href='books.html'">📚 去图书馆看看</button>
    </div>`;
    return;
  }
  let html = '';
  favoriteBooks.forEach((b, i) => {
    html += `
    <div class="book-card">
      <div class="book-cover ${coverClasses[b.cover]}">
        ${b.emoji}
        <span class="ar-badge">AR ${b.ar}</span>
      </div>
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>
      <button class="card-btn secondary" onclick="addToShelf(${i})">📥 加入书架</button>
    </div>`;
  });
  grid.innerHTML = html;
  document.getElementById('count-favorites').textContent = favoriteBooks.length;
}

function renderCompleted() {
  const grid = document.getElementById('grid-completed');
  if (completedBooks.length === 0) {
    grid.innerHTML = `
    <div class="empty-state" style="grid-column:1/-1">
      <div class="empty-emoji">🏆</div>
      <div class="empty-title">还没有读完的书</div>
      <div class="empty-desc">继续阅读，完成阅读挑战<br>获得成就徽章吧</div>
      <button class="empty-btn" onclick="switchTab('reading', document.querySelector('.tab-bar button'))">📖 去阅读</button>
    </div>`;
    return;
  }
  let html = '';
  completedBooks.forEach(b => {
    const dateStr = b.finished.replace(/-/g, '.');
    const quizBadge = b.quizPass
      ? '<span class="stat-badge quiz-pass">✓ 测验通过</span>'
      : '<span class="stat-badge quiz-fail">测验未通过</span>';
    html += `
    <div class="book-card">
      <div class="book-cover ${coverClasses[b.cover]}">
        ${b.emoji}
        <span class="checkmark">✓</span>
      </div>
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>
      <div class="completed-info">
        <div class="finish-date">读完于 ${dateStr}</div>
        <div class="stats-row">
          <span class="stat-badge words">📝 ${b.words}词</span>
          ${quizBadge}
        </div>
      </div>
      <button class="card-btn success" onclick="showToast('正在重新阅读...')">🔄 再读一遍</button>
    </div>`;
  });
  grid.innerHTML = html;
  document.getElementById('count-completed').textContent = completedBooks.length;
}

function addToShelf(idx) {
  const book = favoriteBooks[idx];
  if (readingBooks.length >= SHELF_LIMIT) {
    showToast('书架已满，请先完成阅读');
    return;
  }
  readingBooks.push({
    title: book.title,
    author: book.author,
    emoji: book.emoji,
    ar: book.ar,
    expiry: 14,
    progress: 0,
    cover: book.cover
  });
  favoriteBooks.splice(idx, 1);
  renderReading();
  renderFavorites();
  showToast(`已将《${book.title}》加入书架`);
}

// Initialize
renderReading();
renderFavorites();
renderCompleted();
</script>
</body>
</html>
