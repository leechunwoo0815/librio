<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>押金管理 · DmkWords</title>
  <style>
    :root {
      --bg: oklch(98% 0.003 250);
      --surface: oklch(100% 0 0);
      --fg: oklch(20% 0.015 275);
      --muted: oklch(48% 0.02 250);
      --border: oklch(90% 0.008 250);
      --accent: oklch(54% 0.17 275);
      --accent-soft: oklch(54% 0.17 275 / 0.1);
      --accent-hover: oklch(48% 0.17 275);
      --secondary: oklch(86% 0.20 135);
      --success: oklch(72% 0.20 145);
      --success-soft: oklch(72% 0.20 145 / 0.1);
      --warning: oklch(78% 0.16 85);
      --warning-soft: oklch(78% 0.16 85 / 0.12);
      --error: oklch(62% 0.22 25);
      --error-soft: oklch(62% 0.22 25 / 0.08);
      --radius: 16px; --radius-sm: 10px; --radius-lg: 20px;
      --font-display: 'PingFang SC', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
      --font-mono: ui-monospace, 'SF Mono', Menlo, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--fg); font-family: var(--font-body);
      font-size: 15px; line-height: 1.5; max-width: 430px; margin: 0 auto;
      min-height: 100vh; padding-bottom: 32px; -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: none; background: none; }

    /* nav bar */
    .nav-bar {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-bar .back { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 10px; }
    .nav-bar .back svg { width: 20px; height: 20px; }
    .nav-bar .title { font-family: var(--font-display); font-size: 17px; font-weight: 600; }

    /* status card */
    .status-section { padding: 16px; }
    .status-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px 20px;
      box-shadow: 0 2px 12px oklch(20% 0.015 275 / 0.04);
    }
    .status-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
    }
    .status-badge {
      padding: 5px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .status-paid { background: var(--success-soft); color: var(--success); }
    .status-unpaid { background: var(--warning-soft); color: oklch(55% 0.14 85); }
    .status-refunding { background: var(--accent-soft); color: var(--accent); }
    .status-refunded { background: oklch(48% 0.02 250 / 0.1); color: var(--muted); }
    .status-deducted { background: var(--error-soft); color: var(--error); }

    .balance-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;
    }
    .balance-item {
      background: var(--bg); border-radius: var(--radius-sm); padding: 14px;
    }
    .balance-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .balance-value {
      font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--fg);
    }
    .balance-value.muted-val { color: var(--muted); font-size: 20px; }

    /* action buttons */
    .action-buttons { display: flex; gap: 10px; }
    .btn-primary {
      flex: 1; padding: 12px 0; border-radius: 999px;
      background: var(--accent); color: white; font-size: 15px; font-weight: 600;
      text-align: center; transition: transform 0.1s ease, background 0.15s ease;
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-outline {
      flex: 1; padding: 12px 0; border-radius: 999px;
      border: 1.5px solid var(--accent); color: var(--accent); font-size: 15px; font-weight: 600;
      text-align: center; transition: all 0.15s ease;
    }
    .btn-outline:hover { background: var(--accent-soft); }
    .btn-danger {
      flex: 1; padding: 12px 0; border-radius: 999px;
      background: var(--error); color: white; font-size: 15px; font-weight: 600;
      text-align: center; transition: transform 0.1s ease;
    }
    .btn-danger:active { transform: scale(0.97); }

    /* info banner */
    .info-banner {
      margin: 0 16px 16px; padding: 12px 14px; border-radius: var(--radius-sm);
      background: var(--accent-soft); font-size: 13px; color: var(--accent);
      display: flex; align-items: flex-start; gap: 8px; line-height: 1.5;
    }
    .info-banner .icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* record section */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 10px;
    }
    .section-title {
      font-family: var(--font-display); font-size: 16px; font-weight: 600;
    }
    .section-link { font-size: 13px; color: var(--accent); }

    .record-list { padding: 0 16px; }
    .record-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .record-item:last-child { border-bottom: none; }
    .record-icon {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      display: grid; place-items: center; font-size: 18px; flex-shrink: 0;
    }
    .record-icon.pay { background: var(--success-soft); }
    .record-icon.deduct { background: var(--error-soft); }
    .record-icon.refund { background: var(--accent-soft); }
    .record-info { flex: 1; min-width: 0; }
    .record-type { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .record-reason { font-size: 12px; color: var(--muted); }
    .record-right { text-align: right; flex-shrink: 0; }
    .record-amount { font-family: var(--font-mono); font-size: 15px; font-weight: 600; }
    .record-amount.minus { color: var(--error); }
    .record-amount.plus { color: var(--success); }
    .record-date { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* empty state */
    .empty-state {
      text-align: center; padding: 48px 16px; color: var(--muted);
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* status selector demo */
    .status-demo {
      margin: 12px 16px; padding: 12px 14px; border-radius: var(--radius-sm);
      background: oklch(48% 0.02 250 / 0.06); font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .status-demo label { font-weight: 500; margin-right: 4px; }
    .status-demo select {
      padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px;
      font: inherit; font-size: 12px; background: var(--surface); color: var(--fg);
    }

    @media (min-width: 768px) {
      body { max-width: 430px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }
    @media (min-width: 1024px) {
      body { max-width: 430px; margin: 0 auto; box-shadow: 0 0 40px oklch(20% 0.015 275 / 0.06); }
    }
  </style>
</head>
<body>
  <div class="nav-bar">
    <a class="back" href="member.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></a>
    <span class="title">押金管理</span>
  </div>

  <!-- Status demo switcher for prototype -->
  <div class="status-demo">
    <label>原型演示 - 切换状态：</label>
    <select id="statusSwitch" onchange="switchStatus(this.value)">
      <option value="paid">已缴纳</option>
      <option value="unpaid">未缴纳</option>
      <option value="refunding">退款中</option>
      <option value="refunded">已退</option>
      <option value="deducted">已扣</option>
    </select>
  </div>

  <div class="status-section" id="statusSection">
    <!-- Filled by JS based on status -->
  </div>

  <div class="info-banner">
    <span class="icon">💡</span>
    <span>押金 ¥1,200 为图书借阅保证金，退还时将原路退回支付账户，处理时间约 1-3 个工作日。</span>
  </div>

  <div class="section-header">
    <span class="section-title">押金记录</span>
    <span class="section-link">查看全部 ›</span>
  </div>

  <div class="record-list" id="recordList">
    <div class="record-item">
      <div class="record-icon pay">💰</div>
      <div class="record-info">
        <div class="record-type">缴纳押金</div>
        <div class="record-reason">首次借阅押金缴纳</div>
      </div>
      <div class="record-right">
        <div class="record-amount plus">+¥1,200</div>
        <div class="record-date">2025-09-15</div>
      </div>
    </div>
    <div class="record-item">
      <div class="record-icon deduct">📕</div>
      <div class="record-info">
        <div class="record-type">罚款扣除</div>
        <div class="record-reason">「Charlotte's Web」逾期 3 天</div>
      </div>
      <div class="record-right">
        <div class="record-amount minus">-¥15</div>
        <div class="record-date">2025-11-20</div>
      </div>
    </div>
    <div class="record-item">
      <div class="record-icon pay">💰</div>
      <div class="record-info">
        <div class="record-type">补缴押金</div>
        <div class="record-reason">借阅升级，补充押金差额</div>
      </div>
      <div class="record-right">
        <div class="record-amount plus">+¥200</div>
        <div class="record-date">2025-10-08</div>
      </div>
    </div>
    <div class="record-item">
      <div class="record-icon deduct">📕</div>
      <div class="record-info">
        <div class="record-type">罚款扣除</div>
        <div class="record-reason">「Diary of a Wimpy Kid」图书损坏</div>
      </div>
      <div class="record-right">
        <div class="record-amount minus">-¥30</div>
        <div class="record-date">2025-12-05</div>
      </div>
    </div>
    <div class="record-item">
      <div class="record-icon refund">↩️</div>
      <div class="record-info">
        <div class="record-type">退款到账</div>
        <div class="record-reason">退还押金至微信零钱</div>
      </div>
      <div class="record-right">
        <div class="record-amount plus">+¥1,155</div>
        <div class="record-date">2026-01-10</div>
      </div>
    </div>
  </div>

  <script>
    const statusData = {
      paid: {
        badge: '<span class="status-badge status-paid">✅ 已缴纳</span>',
        balance: '¥1,200',
        fine: '¥0',
        fineColor: '',
        buttons: '<button class="btn-outline" onclick="alert(\'申请退款功能演示\')">申请退款</button>'
      },
      unpaid: {
        badge: '<span class="status-badge status-unpaid">⚠️ 未缴纳</span>',
        balance: '¥0',
        fine: '¥0',
        fineColor: '',
        buttons: '<button class="btn-primary" onclick="alert(\'缴纳押金功能演示\')">缴纳押金 ¥1,200</button>'
      },
      refunding: {
        badge: '<span class="status-badge status-refunding">⏳ 退款中</span>',
        balance: '¥1,200',
        fine: '¥0',
        fineColor: '',
        buttons: '<button class="btn-outline" style="opacity:0.5;pointer-events:none;">退款处理中...</button>'
      },
      refunded: {
        badge: '<span class="status-badge status-refunded">↩️ 已退</span>',
        balance: '¥0',
        fine: '¥0',
        fineColor: '',
        buttons: '<button class="btn-primary" onclick="alert(\'重新缴纳押金功能演示\')">重新缴纳押金 ¥1,200</button>'
      },
      deducted: {
        badge: '<span class="status-badge status-deducted">❌ 已扣</span>',
        balance: '¥1,140',
        fine: '¥60',
        fineColor: 'style="color: var(--error);"',
        buttons: '<button class="btn-danger" onclick="alert(\'补缴功能演示\')">补缴押金 ¥60</button>'
      }
    };

    function switchStatus(status) {
      const d = statusData[status];
      document.getElementById('statusSection').innerHTML = `
        <div class="status-card">
          <div class="status-header">${d.badge}</div>
          <div class="balance-grid">
            <div class="balance-item">
              <div class="balance-label">押金余额</div>
              <div class="balance-value">${d.balance}</div>
            </div>
            <div class="balance-item">
              <div class="balance-label">未结罚款</div>
              <div class="balance-value ${status === 'deducted' ? '' : 'muted-val'}" ${d.fineColor}>${d.fine}</div>
            </div>
          </div>
          <div class="action-buttons">${d.buttons}</div>
        </div>
      `;
    }

    // init
    switchStatus('paid');
  </script>
</body>
</html>
