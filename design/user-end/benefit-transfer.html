<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>权益转让 · MegaWords</title>
  <style>
    :root {
      --bg: oklch(98% 0.003 250); --surface: oklch(100% 0 0);
      --fg: oklch(20% 0.015 275); --muted: oklch(48% 0.02 250);
      --border: oklch(90% 0.008 250); --accent: oklch(54% 0.17 275);
      --accent-soft: oklch(54% 0.17 275 / 0.1);
      --secondary: oklch(86% 0.20 135); --secondary-soft: oklch(86% 0.20 135 / 0.12);
      --success: oklch(72% 0.20 145); --success-soft: oklch(72% 0.20 145 / 0.1);
      --warning: oklch(78% 0.16 85); --warning-soft: oklch(78% 0.16 85 / 0.1);
      --error: oklch(62% 0.22 25); --error-soft: oklch(62% 0.22 25 / 0.1);
      --radius: 16px; --radius-sm: 10px; --radius-lg: 20px;
      --font-display: 'PingFang SC', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--fg); font-family: var(--font-body);
      font-size: 15px; line-height: 1.5; max-width: 430px; margin: 0 auto;
      min-height: 100vh; padding-bottom: 100px; -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    .nav-bar {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-bar .back { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 10px; }
    .nav-bar .back svg { width: 20px; height: 20px; }
    .nav-bar .title { font-family: var(--font-display); font-size: 17px; font-weight: 600; }
    /* transfer flow */
    .transfer-card {
      margin: 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .transfer-card h3 { font-family: var(--font-display); font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .child-select {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; margin-bottom: 8px; transition: border-color 0.15s;
    }
    .child-select.selected { border-color: var(--accent); border-width: 2px; }
    .child-select .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: grid; place-items: center; font-size: 20px; flex-shrink: 0;
    }
    .child-select .avatar.a { background: oklch(92% 0.08 275 / 0.2); }
    .child-select .avatar.b { background: oklch(92% 0.08 135 / 0.2); }
    .child-select .info { flex: 1; }
    .child-select .name { font-weight: 600; font-size: 15px; }
    .child-select .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .child-select .check {
      width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
      display: grid; place-items: center; flex-shrink: 0; transition: all 0.15s;
    }
    .child-select.selected .check {
      background: var(--accent); border-color: var(--accent);
    }
    .child-select.selected .check svg { color: white; }
    /* arrow */
    .arrow-section {
      display: flex; align-items: center; justify-content: center;
      padding: 16px; color: var(--muted);
    }
    .arrow-section svg { width: 24px; height: 24px; }
    /* days info */
    .days-info {
      margin: 0 16px 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .days-info h3 { font-family: var(--font-display); font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .days-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; font-size: 14px;
    }
    .days-row .label { color: var(--muted); }
    .days-row .value { font-weight: 600; font-variant-numeric: tabular-nums; }
    .days-row.highlight .value { color: var(--accent); font-size: 18px; }
    /* check list */
    .check-list {
      margin: 0 16px 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .check-list h3 { font-family: var(--font-display); font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .check-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 0;
      font-size: 14px;
    }
    .check-icon {
      width: 22px; height: 22px; border-radius: 50%;
      display: grid; place-items: center; flex-shrink: 0;
    }
    .check-icon.pass { background: var(--success-soft); color: var(--success); }
    .check-icon.fail { background: var(--error-soft); color: var(--error); }
    .check-icon svg { width: 14px; height: 14px; }
    .tip-card {
      margin: 0 16px 16px; padding: 12px 16px;
      background: var(--warning-soft); border-radius: var(--radius-sm);
      font-size: 13px; color: oklch(42% 0.12 85); display: flex; gap: 8px;
    }
    .tip-card svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }
    .submit-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px 28px; background: var(--surface);
      border-top: 1px solid var(--border); max-width: 430px; margin: 0 auto;
    }
    .submit-btn {
      width: 100%; padding: 14px; border-radius: var(--radius);
      background: var(--accent); color: white; font-size: 15px; font-weight: 600;
    }
    .submit-btn:disabled { opacity: 0.5; }
    .submit-btn:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="nav-bar">
    <a class="back" href="member.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="title">权益转让</div>
  </div>

  <div class="transfer-card">
    <h3>转让方（当前孩子）</h3>
    <div class="child-select selected">
      <div class="avatar a">👦</div>
      <div class="info">
        <div class="name">Mega</div>
        <div class="meta">8 岁 · Level 3</div>
      </div>
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
    </div>
  </div>

  <div class="arrow-section">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
  </div>

  <div class="transfer-card">
    <h3>接收方（选择孩子）</h3>
    <div class="child-select" onclick="this.classList.toggle('selected')">
      <div class="avatar b">👧</div>
      <div class="info">
        <div class="name">Mini</div>
        <div class="meta">5 岁 · Level 1</div>
      </div>
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
    </div>
    <div class="child-select" onclick="this.classList.toggle('selected')">
      <div class="avatar a">👦</div>
      <div class="info">
        <div class="name">小明</div>
        <div class="meta">10 岁 · Level 5</div>
      </div>
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
    </div>
  </div>

  <div class="days-info">
    <h3>权益信息</h3>
    <div class="days-row">
      <span class="label">会员类型</span>
      <span class="value">正式会员年卡</span>
    </div>
    <div class="days-row">
      <span class="label">已使用</span>
      <span class="value">45 天</span>
    </div>
    <div class="days-row highlight">
      <span class="label">剩余天数</span>
      <span class="value">320 天</span>
    </div>
  </div>

  <div class="check-list">
    <h3>前置条件检查</h3>
    <div class="check-item">
      <span class="check-icon pass">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
      </span>
      <span>所有图书已归还（0 本在借）</span>
    </div>
    <div class="check-item">
      <span class="check-icon pass">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
      </span>
      <span>无未完成的测验</span>
    </div>
    <div class="check-item">
      <span class="check-icon pass">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
      </span>
      <span>无未处理的退款申请</span>
    </div>
  </div>

  <div class="tip-card">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    <span>转让申请提交后将由管理员审核，审核通过后权益即刻转移。转让后原孩子的阅读记录将保留。</span>
  </div>

  <div class="submit-wrap">
    <button class="submit-btn" onclick="alert('转让申请已提交，请等待审核')">提交转让申请</button>
  </div>
</body>
</html>
