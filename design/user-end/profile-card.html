<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>阅读名片 · MegaWords</title>
  <style>
    :root {
      --bg: oklch(98% 0.003 250); --surface: oklch(100% 0 0);
      --fg: oklch(20% 0.015 275); --muted: oklch(48% 0.02 250);
      --border: oklch(90% 0.008 250); --accent: oklch(54% 0.17 275);
      --accent-soft: oklch(54% 0.17 275 / 0.1); --accent-hover: oklch(48% 0.17 275);
      --secondary: oklch(86% 0.20 135); --secondary-soft: oklch(86% 0.20 135 / 0.12);
      --success: oklch(72% 0.20 145); --warning: oklch(78% 0.16 85);
      --error: oklch(62% 0.22 25); --radius: 16px; --radius-sm: 10px; --radius-lg: 20px;
      --font-display: 'PingFang SC', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
      --font-mono: ui-monospace, 'SF Mono', Menlo, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--fg); font-family: var(--font-body);
      font-size: 15px; line-height: 1.5; max-width: 430px; margin: 0 auto;
      min-height: 100vh; padding-bottom: 40px; -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    /* nav bar */
    .nav-bar {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-bar .back { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 10px; }
    .nav-bar .back svg { width: 20px; height: 20px; }
    .nav-bar .title { font-family: var(--font-display); font-size: 17px; font-weight: 600; }
    .nav-bar .spacer { flex: 1; }
    /* card container */
    .card-wrapper { padding: 20px 16px 16px; }
    /* profile card */
    .profile-card {
      background: linear-gradient(160deg, oklch(54% 0.17 275) 0%, oklch(42% 0.14 290) 45%, oklch(38% 0.12 300) 100%);
      border-radius: var(--radius-lg); padding: 28px 24px 24px;
      color: white; position: relative; overflow: hidden;
      box-shadow: 0 8px 32px oklch(54% 0.17 275 / 0.25);
    }
    .profile-card::before {
      content: ''; position: absolute; top: -40px; right: -30px;
      width: 140px; height: 140px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .profile-card::after {
      content: ''; position: absolute; bottom: -20px; left: -20px;
      width: 100px; height: 100px; border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    /* card header */
    .card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; position: relative; z-index: 1; }
    .card-avatar {
      width: 68px; height: 68px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.3);
      display: grid; place-items: center; font-size: 32px;
      backdrop-filter: blur(8px); flex-shrink: 0;
    }
    .card-identity { flex: 1; }
    .card-cn-name { font-family: var(--font-display); font-size: 22px; font-weight: 700; }
    .card-en-name { font-size: 14px; opacity: 0.8; margin-top: 2px; font-weight: 500; }
    /* level badge */
    .level-section {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px; position: relative; z-index: 1;
    }
    .level-badge-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, oklch(78% 0.16 85), oklch(68% 0.16 85));
      display: grid; place-items: center; font-size: 22px; font-weight: 800;
      color: white; box-shadow: 0 4px 12px oklch(78% 0.16 85 / 0.35);
      font-family: var(--font-display);
    }
    .level-text .level-title {
      font-family: var(--font-display); font-size: 16px; font-weight: 600;
    }
    .level-text .level-subtitle {
      font-size: 12px; opacity: 0.7; margin-top: 1px;
    }
    /* stats row */
    .stats-row {
      display: flex; gap: 0; margin-bottom: 20px;
      background: rgba(255,255,255,0.1); border-radius: var(--radius);
      position: relative; z-index: 1;
    }
    .stat-item {
      flex: 1; text-align: center; padding: 14px 8px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .stat-item:last-child { border-right: none; }
    .stat-val {
      font-family: var(--font-display); font-size: 22px; font-weight: 700;
    }
    .stat-label { font-size: 11px; opacity: 0.75; margin-top: 2px; }
    /* achievements */
    .achievements {
      display: flex; gap: 10px; margin-bottom: 20px;
      position: relative; z-index: 1;
    }
    .ach-item {
      flex: 1; text-align: center; padding: 10px 6px;
      background: rgba(255,255,255,0.1); border-radius: var(--radius-sm);
      backdrop-filter: blur(4px);
    }
    .ach-icon { font-size: 28px; margin-bottom: 4px; }
    .ach-name { font-size: 11px; opacity: 0.85; }
    /* divider */
    .card-divider {
      height: 1px; background: rgba(255,255,255,0.12);
      margin-bottom: 16px; position: relative; z-index: 1;
    }
    /* qr section */
    .qr-section {
      display: flex; align-items: center; gap: 14px;
      position: relative; z-index: 1;
    }
    .qr-code {
      width: 56px; height: 56px; border-radius: 8px;
      background: white; display: grid; place-items: center;
      padding: 4px; flex-shrink: 0;
    }
    .qr-code svg { width: 100%; height: 100%; }
    .qr-text { font-size: 12px; opacity: 0.7; line-height: 1.6; }
    .qr-text strong { font-weight: 600; opacity: 1; display: block; font-size: 13px; margin-bottom: 2px; }
    /* brand footer */
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 16px; position: relative; z-index: 1;
    }
    .brand {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      opacity: 0.9;
    }
    .brand-icon {
      width: 24px; height: 24px; border-radius: 6px;
      background: rgba(255,255,255,0.2); display: grid; place-items: center;
      font-size: 12px; font-weight: 800;
    }
    .card-date { font-size: 11px; opacity: 0.5; }
    /* buttons */
    .action-btns { padding: 20px 16px 0; display: flex; gap: 10px; }
    .btn {
      flex: 1; padding: 14px; border-radius: var(--radius);
      font-size: 15px; font-weight: 600; text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn svg { width: 18px; height: 18px; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:active { background: var(--accent-hover); }
    .btn-outline {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--fg);
    }
    .btn-outline:active { background: var(--bg); }
    /* tip */
    .tip {
      text-align: center; padding: 16px; font-size: 12px; color: var(--muted);
    }
    /* success toast */
    .toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: oklch(20% 0 0 / 0.8); color: white;
      padding: 14px 24px; border-radius: var(--radius);
      font-size: 14px; font-weight: 500; z-index: 100;
      opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="nav-bar">
    <a class="back" href="member.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <span class="title">阅读名片</span>
    <div class="spacer"></div>
  </div>

  <div class="card-wrapper">
    <div class="profile-card" id="profileCard">
      <!-- header: avatar + name -->
      <div class="card-header">
        <div class="card-avatar">👦</div>
        <div class="card-identity">
          <div class="card-cn-name">小明</div>
          <div class="card-en-name">Tom</div>
        </div>
      </div>

      <!-- level badge -->
      <div class="level-section">
        <div class="level-badge-icon">B</div>
        <div class="level-text">
          <div class="level-title">B级 · 初学者</div>
          <div class="level-subtitle">Beginner Level</div>
        </div>
      </div>

      <!-- reading stats -->
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-val">23</div>
          <div class="stat-label">读完本书</div>
        </div>
        <div class="stat-item">
          <div class="stat-val">1,280</div>
          <div class="stat-label">累计词数</div>
        </div>
        <div class="stat-item">
          <div class="stat-val">15</div>
          <div class="stat-label">连续打卡</div>
        </div>
      </div>

      <!-- achievement badges -->
      <div class="achievements">
        <div class="ach-item">
          <div class="ach-icon">🔥</div>
          <div class="ach-name">连续7天</div>
        </div>
        <div class="ach-item">
          <div class="ach-icon">📚</div>
          <div class="ach-name">读完20本</div>
        </div>
        <div class="ach-item">
          <div class="ach-icon">⭐</div>
          <div class="ach-name">测验满分</div>
        </div>
      </div>

      <div class="card-divider"></div>

      <!-- qr code -->
      <div class="qr-section">
        <div class="qr-code">
          <!-- placeholder QR code SVG -->
          <svg viewBox="0 0 50 50" fill="none">
            <rect x="2" y="2" width="18" height="18" rx="2" stroke="#333" stroke-width="2"/>
            <rect x="6" y="6" width="10" height="10" rx="1" fill="#333"/>
            <rect x="30" y="2" width="18" height="18" rx="2" stroke="#333" stroke-width="2"/>
            <rect x="34" y="6" width="10" height="10" rx="1" fill="#333"/>
            <rect x="2" y="30" width="18" height="18" rx="2" stroke="#333" stroke-width="2"/>
            <rect x="6" y="34" width="10" height="10" rx="1" fill="#333"/>
            <rect x="24" y="24" width="4" height="4" fill="#333"/>
            <rect x="30" y="30" width="4" height="4" fill="#333"/>
            <rect x="36" y="24" width="4" height="4" fill="#333"/>
            <rect x="42" y="36" width="4" height="4" fill="#333"/>
            <rect x="30" y="42" width="4" height="4" fill="#333"/>
            <rect x="42" y="42" width="4" height="4" fill="#333"/>
            <rect x="36" y="36" width="4" height="4" fill="#333"/>
            <rect x="24" y="36" width="4" height="4" fill="#333"/>
            <rect x="42" y="30" width="4" height="4" fill="#333"/>
          </svg>
        </div>
        <div class="qr-text">
          <strong>扫码加入 MegaWords</strong>
          让孩子爱上阅读，轻松掌握英文词汇
        </div>
      </div>

      <!-- brand footer -->
      <div class="card-footer">
        <div class="brand">
          <div class="brand-icon">M</div>
          MegaWords
        </div>
        <div class="card-date">2026.06.09</div>
      </div>
    </div>
  </div>

  <!-- action buttons -->
  <div class="action-btns">
    <button class="btn btn-primary" onclick="saveImage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      保存图片
    </button>
    <button class="btn btn-outline" onclick="shareCard()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
      分享给朋友
    </button>
  </div>

  <div class="tip">长按名片可保存为图片</div>

  <!-- toast -->
  <div class="toast" id="toast">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span id="toastText">已保存到相册</span>
  </div>

  <script>
    function showToast(text) {
      const toast = document.getElementById('toast');
      document.getElementById('toastText').textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function saveImage() {
      showToast('已保存到相册');
    }

    function shareCard() {
      showToast('已复制分享链接');
    }
  </script>
</body>
</html>
