<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>退款申请 · DmkWords</title>
  <style>
    :root {
      --bg: oklch(98% 0.003 250); --surface: oklch(100% 0 0);
      --fg: oklch(20% 0.015 275); --muted: oklch(48% 0.02 250);
      --border: oklch(90% 0.008 250); --accent: oklch(54% 0.17 275);
      --accent-soft: oklch(54% 0.17 275 / 0.1);
      --success: oklch(72% 0.20 145); --success-soft: oklch(72% 0.20 145 / 0.1);
      --warning: oklch(78% 0.16 85); --warning-soft: oklch(78% 0.16 85 / 0.1);
      --error: oklch(62% 0.22 25); --error-soft: oklch(62% 0.22 25 / 0.1);
      --radius: 16px; --radius-sm: 10px; --radius-lg: 20px;
      --font-display: 'PingFang SC', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
      --font-mono: ui-monospace, 'SF Mono', Menlo, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--fg); font-family: var(--font-body);
      font-size: 15px; line-height: 1.5; max-width: 430px; margin: 0 auto;
      min-height: 100vh; padding-bottom: 100px; -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    .nav-bar {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-bar .back { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 10px; }
    .nav-bar .back svg { width: 20px; height: 20px; }
    .nav-bar .title { font-family: var(--font-display); font-size: 17px; font-weight: 600; }
    .info-card {
      margin: 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .info-card h3 { font-family: var(--font-display); font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; font-size: 14px;
    }
    .info-row .label { color: var(--muted); }
    .info-row .value { font-weight: 500; }
    .info-row.total { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 12px; }
    .info-row.total .value { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--accent); }
    .calc-card {
      margin: 0 16px 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .calc-card h3 { font-family: var(--font-display); font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .calc-step {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 0; font-size: 14px;
    }
    .calc-step .dot {
      width: 24px; height: 24px; border-radius: 50%;
      display: grid; place-items: center; font-size: 12px; font-weight: 600;
      flex-shrink: 0;
    }
    .calc-step .dot.n { background: var(--accent-soft); color: var(--accent); }
    .calc-step .dot.minus { background: var(--error-soft); color: var(--error); }
    .calc-step .dot.result { background: var(--success-soft); color: var(--success); }
    .calc-step .desc { flex: 1; color: var(--muted); }
    .calc-step .amount { font-weight: 600; font-variant-numeric: tabular-nums; }
    .calc-result {
      margin-top: 8px; padding-top: 12px; border-top: 1px dashed var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .calc-result .label { font-weight: 600; }
    .calc-result .amount {
      font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--success);
    }
    .reason-card {
      margin: 0 16px 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .reason-card h3 { font-family: var(--font-display); font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .reason-textarea {
      width: 100%; min-height: 100px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px; font: inherit; font-size: 14px;
      resize: vertical; outline: none; color: var(--fg); background: var(--bg);
    }
    .reason-textarea:focus { border-color: var(--accent); }
    .reason-textarea::placeholder { color: var(--muted); }
    .tip-card {
      margin: 0 16px 16px; padding: 12px 16px;
      background: var(--warning-soft); border-radius: var(--radius-sm);
      font-size: 13px; color: oklch(42% 0.12 85); display: flex; gap: 8px;
    }
    .tip-card svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }
    .submit-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px 28px; background: var(--surface);
      border-top: 1px solid var(--border); max-width: 430px; margin: 0 auto;
    }
    .submit-btn {
      width: 100%; padding: 14px; border-radius: var(--radius);
      background: var(--accent); color: white; font-size: 15px; font-weight: 600;
    }
    .submit-btn:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="nav-bar">
    <a class="back" href="order-history.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="title">退款申请</div>
  </div>

  <div class="info-card">
    <h3>订单信息</h3>
    <div class="info-row">
      <span class="label">订单号</span>
      <span class="value" style="font-family:var(--font-mono);font-size:13px">MW20250601001</span>
    </div>
    <div class="info-row">
      <span class="label">订单类型</span>
      <span class="value">正式会员年卡</span>
    </div>
    <div class="info-row">
      <span class="label">实付金额</span>
      <span class="value">¥5,400</span>
    </div>
    <div class="info-row">
      <span class="label">已使用天数</span>
      <span class="value">45 天</span>
    </div>
    <div class="info-row total">
      <span class="label">会员有效期</span>
      <span class="value">2025.06.01 — 2026.06.01</span>
    </div>
  </div>

  <div class="calc-card">
    <h3>退款金额计算</h3>
    <div class="calc-step">
      <span class="dot n">1</span>
      <span class="desc">实付金额</span>
      <span class="amount">¥5,400</span>
    </div>
    <div class="calc-step">
      <span class="dot minus">−</span>
      <span class="desc">已使用 45 天（¥14.79/天）</span>
      <span class="amount">¥665.75</span>
    </div>
    <div class="calc-result">
      <span class="label">应退金额</span>
      <span class="amount">¥4,734.25</span>
    </div>
  </div>

  <div class="reason-card">
    <h3>退款原因</h3>
    <textarea class="reason-textarea" placeholder="请填写退款原因，以便我们改进服务…"></textarea>
  </div>

  <div class="tip-card">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    <span>退款申请提交后将在 1-3 个工作日内审核。</span>
  </div>

  <div class="submit-wrap">
    <button class="submit-btn" onclick="alert('退款申请已提交，请等待审核')">提交退款申请</button>
  </div>
</body>
</html>
