<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员登录 — MegaWords 管理后台</title>
<style>
:root {
  --bg: oklch(98% 0.003 250);
  --surface: oklch(100% 0 0);
  --fg: oklch(20% 0.015 275);
  --muted: oklch(48% 0.02 250);
  --border: oklch(90% 0.008 250);
  --accent: oklch(54% 0.17 275);
  --accent-soft: oklch(54% 0.17 275 / 0.1);
  --accent-hover: oklch(48% 0.17 275);
  --error: oklch(62% 0.22 25);
  --radius: 12px; --radius-sm: 8px; --radius-lg: 16px;
  --font-display: 'PingFang SC', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); background: linear-gradient(135deg, oklch(95% 0.02 275) 0%, oklch(96% 0.01 300) 50%, oklch(94% 0.025 250) 100%); color: var(--fg); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

.login-wrapper { width: 100%; max-width: 420px; padding: 20px; }

.login-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: 0 8px 32px oklch(20% 0.015 275 / 0.08), 0 2px 8px oklch(20% 0.015 275 / 0.04);
  padding: 48px 40px 40px;
}

.login-header {
  text-align: center;
  margin-bottom: 36px;
}

.login-logo {
  font-size: 48px;
  margin-bottom: 12px;
}

.login-title {
  font-size: 22px;
  font-weight: 700;
  font-family: var(--font-display);
  color: var(--accent);
  margin-bottom: 4px;
}

.login-subtitle {
  font-size: 13px;
  color: var(--muted);
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--fg);
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  height: 44px;
  padding: 0 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  outline: none;
  transition: all 0.15s;
}

.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
  background: var(--surface);
}

.form-input::placeholder {
  color: oklch(75% 0.01 250);
}

.password-wrapper {
  position: relative;
}

.password-wrapper .form-input {
  padding-right: 44px;
}

.password-toggle {
  position: absolute;
  right: 2px;
  top: 2px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 18px;
  border-radius: 6px;
}

.password-toggle:hover {
  color: var(--fg);
  background: var(--accent-soft);
}

.login-btn {
  width: 100%;
  height: 46px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font-display);
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 8px;
}

.login-btn:hover {
  background: var(--accent-hover);
  box-shadow: 0 4px 12px oklch(54% 0.17 275 / 0.3);
}

.login-btn:active {
  transform: scale(0.98);
}

.login-hint {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  margin-top: 16px;
  padding: 10px;
  background: oklch(96% 0.005 250);
  border-radius: var(--radius-sm);
}

.login-hint span {
  color: var(--error);
}

.login-footer {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  margin-top: 24px;
}
</style>
    <link rel="stylesheet" href="admin-sidebar.css">
  </head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">📚</div>
      <div class="login-title">MegaWords</div>
      <div class="login-subtitle">管理后台登录</div>
    </div>

    <form onsubmit="return false">
      <div class="form-group">
        <label class="form-label" for="username">用户名</label>
        <input class="form-input" type="text" id="username" placeholder="请输入管理员账号" autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <div class="password-wrapper">
          <input class="form-input" type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
          <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="切换密码可见性">👁</button>
        </div>
      </div>

      <button type="submit" class="login-btn">登 录</button>
    </form>

    <div class="login-hint">
      🔒 连续 <span>5 次</span> 错误将锁定 <span>30 分钟</span>
    </div>
  </div>

  <div class="login-footer">
    &copy; 2026 MegaWords 管理后台
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password');
  const btn = document.querySelector('.password-toggle');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}
</script>
  <script src="admin-sidebar.js"></script>
</body>
</html>
