name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install ruff
      - run: ruff check backend/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - run: python -m pytest tests/ -x -q --tb=short
        env:
          MOCK_PAYMENT: "true"
          MOCK_SMS: "true"
          DEBUG: "true"
          SECRET_KEY: "ci-secret-key-not-for-production"
          DATABASE_URL: "sqlite:///:memory:"
          ENABLE_TEST_TOKEN: "true"
