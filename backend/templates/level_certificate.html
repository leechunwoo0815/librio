<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaWords 晋级证书</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.certificate { width: 700px; background: #fff; border: 3px solid #d4af37; border-radius: 20px; padding: 50px; text-align: center; position: relative; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
.certificate::before { content: ""; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; border: 1px solid #d4af37; border-radius: 14px; pointer-events: none; }
.badge { font-size: 72px; margin-bottom: 16px; }
.title { font-size: 14px; color: #d4af37; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 8px; }
.main-title { font-size: 32px; font-weight: 700; color: #333; margin-bottom: 24px; }
.name { font-size: 36px; font-weight: 700; color: #667eea; margin: 20px 0 8px; }
.english-name { font-size: 18px; color: #888; margin-bottom: 24px; }
.level-info { font-size: 22px; color: #555; margin-bottom: 30px; }
.level-info strong { color: #d4af37; font-size: 28px; }
.date { font-size: 14px; color: #999; margin-bottom: 8px; }
.cert-no { font-size: 12px; color: #bbb; }
.divider { width: 60px; height: 2px; background: #d4af37; margin: 20px auto; }
.footer-text { font-size: 13px; color: #aaa; margin-top: 20px; }
</style>
</head>
<body>
<div class="certificate">
  <div class="badge">{badge_emoji}</div>
  <div class="title">Certificate of Achievement</div>
  <div class="main-title">晋级证书</div>
  <div class="divider"></div>
  <div class="name">{child_name}</div>
  <div class="english-name">{english_name}</div>
  <div class="level-info">
    成功晋级至 <strong>{level_name}</strong> 级别
  </div>
  <div class="divider"></div>
  <div class="date">{date}</div>
  <div class="cert-no">证书编号：{cert_no}</div>
  <div class="footer-text">MegaWords 英文阅读平台 · 让阅读成为习惯</div>
</div>
</body>
</html>
