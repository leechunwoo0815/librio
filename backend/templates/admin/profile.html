{% extends "admin/base.html" %}
{% block title %}个人中心{% endblock %}
{% block page_title %}个人中心{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/admin/css/pages/profile.css" />
{% endblock %}

{% block content %}
<div class="profile-container" style="max-width:800px;margin:0 auto;padding:24px">
  <!-- 个人信息卡片 -->
  <div class="profile-card" style="background:var(--surface);border-radius:12px;padding:32px;margin-bottom:24px;border:1px solid var(--border)">
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px">
      <div style="width:80px;height:80px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:32px;color:white" id="adminAvatar">A</div>
      <div>
        <h2 style="margin:0 0 8px 0;font-size:24px" id="adminName">管理员</h2>
        <p style="margin:0;color:var(--muted);font-size:14px" id="adminRole">超级管理员</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">用户名</label>
        <div style="font-weight:500" id="adminUsername">-</div>
      </div>
      <div>
        <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">手机号</label>
        <div style="font-weight:500" id="adminPhone">-</div>
      </div>
      <div>
        <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">最近登录</label>
        <div style="font-weight:500" id="adminLastLogin">-</div>
      </div>
      <div>
        <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">创建时间</label>
        <div style="font-weight:500" id="adminCreateTime">-</div>
      </div>
    </div>
  </div>

  <!-- 修改密码 -->
  <div class="profile-card" style="background:var(--surface);border-radius:12px;padding:32px;margin-bottom:24px;border:1px solid var(--border)">
    <h3 style="margin:0 0 20px 0;font-size:18px">修改密码</h3>
    <form id="passwordForm" onsubmit="changePassword(event)">
      <div class="form-group" style="margin-bottom:16px">
        <label style="display:block;font-size:13px;margin-bottom:6px">当前密码</label>
        <input type="password" class="form-input" name="old_password" required style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px" />
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label style="display:block;font-size:13px;margin-bottom:6px">新密码</label>
        <input type="password" class="form-input" name="new_password" required minlength="6" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px" />
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label style="display:block;font-size:13px;margin-bottom:6px">确认新密码</label>
        <input type="password" class="form-input" name="confirm_password" required minlength="6" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px" />
      </div>
      <button type="submit" class="btn-primary" style="padding:10px 24px;border:none;border-radius:8px;background:var(--accent);color:white;cursor:pointer">保存密码</button>
    </form>
  </div>

  <!-- 操作日志 -->
  <div class="profile-card" style="background:var(--surface);border-radius:12px;padding:32px;border:1px solid var(--border)">
    <h3 style="margin:0 0 20px 0;font-size:18px">最近操作</h3>
    <div id="recentLogs" style="color:var(--muted);text-align:center;padding:20px">加载中...</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  loadProfile();
  loadRecentLogs();
});

async function loadProfile() {
  try {
    // 从 token 中获取当前管理员 ID
    const token = localStorage.getItem('mw_admin_token');
    if (!token) return;
    const payload = JSON.parse(atob(token.split('.')[1]));
    const adminId = payload.sub;

    // 获取当前管理员信息
    const admin = await api.get('/admin/api/admins/' + adminId);
    if (admin) {
      document.getElementById('adminAvatar').textContent = (admin.name || admin.username || 'A').charAt(0).toUpperCase();
      document.getElementById('adminName').textContent = admin.name || admin.username || '-';
      document.getElementById('adminRole').textContent = admin.role_name || (admin.role === 0 ? '超级管理员' : '员工');
      document.getElementById('adminUsername').textContent = admin.username || '-';
      document.getElementById('adminPhone').textContent = admin.phone || '-';
      document.getElementById('adminLastLogin').textContent = admin.last_login ? formatDateTime(admin.last_login) : '-';
      document.getElementById('adminCreateTime').textContent = admin.create_time ? formatDateTime(admin.create_time) : '-';
    }
  } catch (err) {
    console.error('加载个人信息失败', err);
  }
}

async function loadRecentLogs() {
  try {
    const data = await api.get('/admin/api/operation-logs?page=1&page_size=5');
    const logs = data.items || [];
    if (logs.length === 0) {
      document.getElementById('recentLogs').innerHTML = '<p>暂无操作记录</p>';
      return;
    }
    let html = '<div style="display:flex;flex-direction:column;gap:12px">';
    logs.forEach(function(log) {
      html += '<div style="display:flex;justify-content:space-between;padding:12px;background:var(--bg);border-radius:8px">';
      html += '<div><strong>' + escapeHtml(log.module || '-') + '</strong> - ' + escapeHtml(log.action || '-') + '</div>';
      html += '<div style="color:var(--muted);font-size:12px">' + (log.create_time ? formatDateTime(log.create_time) : '-') + '</div>';
      html += '</div>';
    });
    html += '</div>';
    document.getElementById('recentLogs').innerHTML = html;
  } catch (err) {
    document.getElementById('recentLogs').innerHTML = '<p style="color:var(--error)">加载失败</p>';
  }
}

async function changePassword(e) {
  e.preventDefault();
  const form = document.getElementById('passwordForm');
  const fd = new FormData(form);
  const oldPassword = fd.get('old_password');
  const newPassword = fd.get('new_password');
  const confirmPassword = fd.get('confirm_password');

  if (newPassword !== confirmPassword) {
    showToast('两次输入的密码不一致', 'error');
    return;
  }

  try {
    // 从 token 中获取当前管理员 ID
    const token = localStorage.getItem('mw_admin_token');
    if (!token) return;
    const payload = JSON.parse(atob(token.split('.')[1]));
    const adminId = payload.sub;

    await api.put('/admin/api/admins/' + adminId, { password: newPassword });
    showToast('密码修改成功');
    form.reset();
  } catch (err) {
    showToast('密码修改失败: ' + err.message, 'error');
  }
}

function formatDateTime(isoStr) {
  if (!isoStr) return '-';
  const d = new Date(isoStr);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
{% endblock %}
