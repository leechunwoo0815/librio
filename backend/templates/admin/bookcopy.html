{% extends "admin/base.html" %}
{% block title %}馆藏管理{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/admin/css/pages/bookcopy.css" />
{% endblock %}
{% block page_title %}馆藏管理{% endblock %}
{% block content %}

<!-- Toolbar -->
<div class="toolbar">
  <input class="scan-input" type="text" id="barcodeInput" placeholder="扫描或输入条码..." />
  <button class="btn btn-primary" onclick="scanBarcode()">&#x1F4F7; 扫码</button>
  <input class="search-input" type="text" id="searchInput" placeholder="搜索书名 / ISBN" oninput="filterTable()" />
  <select class="filter-select" id="statusFilter" onchange="filterTable()">
    <option>全部状态</option>
    <option>在馆</option>
    <option>借出</option>
    <option>丢失</option>
    <option>损坏</option>
  </select>
  <select class="filter-select" id="venueFilter" onchange="filterTable()">
    <option>全部场馆</option>
    <option>人广馆</option>
    <option>徐汇馆</option>
    <option>浦东馆</option>
  </select>
  <div class="toolbar-spacer"></div>
  <button class="btn btn-outline btn-sm" onclick="exportExcel()">导出 Excel</button>
</div>

<!-- Add Form (hidden) -->
<div class="card card-add" id="addForm">
  <h3>新增副本</h3>
  <form onsubmit="addItem(event);return false">
    <label>图书ID <input type="number" id="fBookId" required class="form-input"></label>
    <label>条码 <input type="text" id="fBarcode" required class="form-input"></label>
    <label>位置 <input type="text" id="fLocation" class="form-input" placeholder="如：1号书架A层"></label>
    <label>备注 <input type="text" id="fNote" class="form-input"></label>
    <div class="mt-12">
      <button type="submit" class="btn btn-primary">入库</button>
      <button type="button" class="btn btn-outline btn-sm" onclick="toggleForm('addForm')">取消</button>
    </div>
  </form>
</div>

<!-- Table -->
<div class="table-wrap">
  <table>
    <thead><tr><th>条码</th><th>书名</th><th>ISBN</th><th>AR 值</th><th>状态</th><th>存放位置</th><th>当前借阅人</th><th>操作</th></tr></thead>
    <tbody id="dataBody"><tr><td colspan="8" class="text-center p-40 text-muted">加载中...</td></tr></tbody>
  </table>
</div>

<!-- Status Badge Samples (CSS class reference) -->
<div class="hidden">
  <span class="status-badge status-available"></span>
  <span class="status-badge status-borrowed"></span>
  <span class="status-badge status-lost"></span>
  <span class="status-badge status-damaged"></span>
</div>

<!-- Pagination -->
<div class="pagination">
  <span id="paginationInfo">共 0 条记录</span>
  <div class="page-btns" id="paginationPages">
    <button class="page-btn active">1</button>
    <button class="page-btn">2</button>
    <button class="page-btn">3</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/admin/js/pages/bookcopy.js"></script>
{% endblock %}
