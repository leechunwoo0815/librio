<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理后台登录 · DmkWords</title>
  <link rel="stylesheet" href="/static/admin/css/base.css" />
  <link rel="stylesheet" href="/static/admin/css/pages/login.css" />
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">M</div>
      <div class="login-title">DmkWords 管理后台</div>
      <div class="login-subtitle">请输入管理员账号登录</div>
    </div>
    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input class="form-input" type="text" id="username" placeholder="请输入用户名" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <div class="password-wrapper">
          <input class="form-input" type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required />
          <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
        </div>
      </div>
      <button type="button" class="login-btn" id="loginBtn" onclick="doLogin();">登 录</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <script src="/static/admin/js/pages/login.js"></script>
</body>
</html>
