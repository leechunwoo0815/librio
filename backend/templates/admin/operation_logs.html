{% extends "admin/base.html" %}
{% block title %}操作日志{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/admin/css/pages/operation_logs.css" />
{% endblock %}
{% block page_title %}操作日志{% endblock %}

{% block content %}
<!-- Filter bar -->
<div class="filter-bar">
  <select id="moduleFilter"><option value="">全部模块</option><option value="config">系统配置</option><option value="book">图书</option><option value="user">用户</option><option value="deposit">押金</option><option value="activity">活动</option></select>
  <input type="text" id="operatorSearch" class="search-input" placeholder="搜索操作人..." />
  <input type="date" id="dateFrom" class="search-input" />
  <span class="date-sep">至</span>
  <input type="date" id="dateTo" class="search-input" />
  <button class="btn btn-primary" onclick="loadLogs(1)">查询</button>
  <div class="flex-1"></div>
  <button class="btn btn-secondary" onclick="exportLogs()">导出日志</button>
</div>

<!-- Table -->
<div class="table-card">
  <table>
    <thead>
      <tr><th>操作人ID</th><th>时间</th><th>模块</th><th>操作类型</th><th>内容摘要</th><th>IP地址</th></tr>
    </thead>
    <tbody id="logTable">
      <tr><td colspan="6" class="text-center p-40 text-muted">加载中...</td></tr>
    </tbody>
  </table>
</div>

<!-- Pagination -->
<div class="pagination" id="pagination"></div>
{% endblock %}

{% block scripts %}
<script src="/static/admin/js/pages/operation_logs.js"></script>
{% endblock %}
