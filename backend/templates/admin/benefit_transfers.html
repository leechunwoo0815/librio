{% extends "admin/base.html" %}
{% block title %}权益转让审核{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/admin/css/pages/operation_logs.css" />
{% endblock %}
{% block page_title %}权益转让审核{% endblock %}

{% block content %}
<!-- Tab bar -->
<div class="filter-bar">
  <button class="btn {{ 'btn-primary' if active_tab == 'pending' else 'btn-outline' }}" onclick="switchTab('pending')">待审核</button>
  <button class="btn {{ 'btn-primary' if active_tab == 'history' else 'btn-outline' }}" onclick="switchTab('history')">审核记录</button>
  <div class="flex-1"></div>
</div>

<!-- Table -->
<div class="table-card">
  <table>
    <thead>
      <tr><th>ID</th><th>申请人</th><th>源孩子</th><th>目标孩子</th><th>申请时间</th><th>状态</th><th>操作</th></tr>
    </thead>
    <tbody id="transferTable">
      <tr><td colspan="7" class="text-center p-40 text-muted">加载中...</td></tr>
    </tbody>
  </table>
</div>

<!-- Pagination -->
<div class="pagination" id="pagination"></div>

<!-- Review Modal -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">审核转让申请</h3>
      <button class="modal-close" data-close-modal="reviewModal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="info-grid mb-16">
        <div><label>源孩子</label><span id="modalSource">--</span></div>
        <div><label>目标孩子</label><span id="modalTarget">--</span></div>
        <div><label>申请人</label><span id="modalUser">--</span></div>
        <div><label>申请时间</label><span id="modalTime">--</span></div>
      </div>
      <div class="form-group">
        <label>审核备注</label>
        <textarea id="reviewRemark" class="form-input" rows="3" placeholder="选填审核备注..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="doReject()">拒绝</button>
      <button class="btn btn-primary" onclick="doApprove()">通过</button>
      <button class="btn btn-outline" data-close-modal="reviewModal">取消</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/admin/js/pages/benefit_transfers.js"></script>
{% endblock %}
