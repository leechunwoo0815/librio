{% extends "admin/base.html" %}
{% block title %}题库管理{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/admin/css/pages/questions.css" />
{% endblock %}
{% block page_title %}题库管理{% endblock %}
{% block content %}
<div class="stats-grid">
  <div class="stat-card"><div class="stat-label">总题目数</div><div class="stat-value" id="statTotal">--</div></div>
  <div class="stat-card"><div class="stat-label">涉及图书</div><div class="stat-value" id="statBooks">--</div></div>
  <div class="stat-card"><div class="stat-label">平均难度</div><div class="stat-value" id="statDiff">--</div></div>
  <div class="stat-card"><div class="stat-label">今日新增</div><div class="stat-value" id="statNew">--</div></div>
</div>

<div style="display:flex;gap:16px;min-height:600px">
  <!-- left: book list -->
  <div style="width:300px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
    <div style="padding:12px;border-bottom:1px solid var(--border)">
      <input class="search-input" id="bookSearch" placeholder="搜索图书…" style="width:100%" />
    </div>
    <div style="overflow-y:auto;max-height:540px" id="bookList">
      <div style="padding:40px;text-align:center;color:var(--muted);font-size:13px;">输入书名或ISBN搜索</div>
    </div>
  </div>
  <!-- right: questions -->
  <div style="flex:1;display:flex;flex-direction:column;gap:12px" id="questionPanel">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-family:var(--font-display);font-size:16px;font-weight:600" id="selectedBookTitle">选择一本书</div>
        <div style="font-size:12px;color:var(--muted)" id="selectedBookMeta">请从左侧列表选择</div>
      </div>
      <button class="btn btn-primary" onclick="document.getElementById('addQModal').classList.add('show')">+ 新增题目</button>
    </div>
    <div id="questionsList" style="display:flex;flex-direction:column;gap:12px;">
      <div style="text-align:center;padding:40px;color:var(--muted);">请从左侧选择一本书查看题目</div>
    </div>
  </div>
</div>

<!-- Add Question Modal -->
<div class="modal-overlay" id="addQModal">
  <div class="modal">
    <h3>新增题目</h3>
    <div class="form-group"><label>图书ISBN</label><input class="form-input" id="fIsbn" placeholder="输入ISBN自动匹配图书" /></div>
    <div class="form-group"><label>题目文本</label><textarea class="form-textarea" id="fQuestion" placeholder="输入题目…"></textarea></div>
    <div class="form-group"><label>选项 A</label><input class="form-input" id="fA" placeholder="选项 A" /></div>
    <div class="form-group"><label>选项 B</label><input class="form-input" id="fB" placeholder="选项 B" /></div>
    <div class="form-group"><label>选项 C</label><input class="form-input" id="fC" placeholder="选项 C" /></div>
    <div class="form-group"><label>选项 D</label><input class="form-input" id="fD" placeholder="选项 D" /></div>
    <div class="form-group"><label>正确答案</label><select class="form-input" id="fAnswer"><option>A</option><option>B</option><option>C</option><option>D</option></select></div>
    <div class="form-group"><label>难度 (1-5)</label><input class="form-input" type="number" id="fDiff" value="1" min="1" max="5" /></div>
    <div class="form-group"><label>解析（选填）</label><textarea class="form-textarea" id="fExplanation" placeholder="为什么这是正确答案…"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="document.getElementById('addQModal').classList.remove('show')">取消</button>
      <button class="btn btn-primary" id="addQBtn">保存</button>
    </div>
  </div>
</div>

<!-- Edit Question Modal -->
<div class="modal-overlay" id="editQModal">
  <div class="modal">
    <h3>编辑题目</h3>
    <input type="hidden" id="editId" />
    <div class="form-group"><label>题目文本</label><textarea class="form-textarea" id="editQuestion"></textarea></div>
    <div class="form-group"><label>选项 A</label><input class="form-input" id="editA" /></div>
    <div class="form-group"><label>选项 B</label><input class="form-input" id="editB" /></div>
    <div class="form-group"><label>选项 C</label><input class="form-input" id="editC" /></div>
    <div class="form-group"><label>选项 D</label><input class="form-input" id="editD" /></div>
    <div class="form-group"><label>正确答案</label><select class="form-input" id="editAnswer"><option>A</option><option>B</option><option>C</option><option>D</option></select></div>
    <div class="form-group"><label>难度 (1-5)</label><input class="form-input" type="number" id="editDiff" min="1" max="5" /></div>
    <div class="form-group"><label>解析</label><input class="form-input" id="editExplanation" /></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="document.getElementById('editQModal').classList.remove('show')">取消</button>
      <button class="btn btn-primary" id="saveEditBtn">保存</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let isSubmitting = false;
let selectedBookId = null;

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// Search books
document.getElementById('bookSearch').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') searchBooks();
});
document.getElementById('bookSearch').addEventListener('input', function() {
  clearTimeout(this._debounce);
  this._debounce = setTimeout(searchBooks, 300);
});

async function searchBooks() {
  var keyword = document.getElementById('bookSearch').value.trim();
  if (!keyword) return;
  try {
    var data = await api.get('/admin/api/books?keyword=' + encodeURIComponent(keyword));
    var items = data.items || [];
    var el = document.getElementById('bookList');
    if (!items.length) {
      el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">未找到图书</div>';
      return;
    }
    el.innerHTML = items.map(function(b) {
      return '<div style="padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border)" onclick="selectBook(' + b.id + ',\'' + escapeHtml(b.title) + '\',' + (b.ar_value||0) + ')">' +
        '<div style="font-weight:600;font-size:14px">' + escapeHtml(b.title) + '</div>' +
        '<div style="font-size:12px;color:var(--muted)">AR ' + (b.ar_value||'-') + '</div>' +
      '</div>';
    }).join('');
  } catch (e) {
    showToast('搜索失败: ' + e.message, 'error');
  }
}

async function selectBook(bookId, title, arLevel) {
  selectedBookId = bookId;
  document.getElementById('selectedBookTitle').textContent = title;
  document.getElementById('selectedBookMeta').textContent = 'AR ' + arLevel;
  try {
    var data = await api.get('/admin/api/advancement/questions/search?keyword=' + encodeURIComponent(title));
    var items = data.items || [];
    document.getElementById('selectedBookMeta').textContent = 'AR ' + arLevel + ' · 共 ' + items.length + ' 道题';
    renderQuestions(items);
  } catch (e) {
    showToast('加载题目失败', 'error');
  }
}

function renderQuestions(items) {
  var el = document.getElementById('questionsList');
  if (!items.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);">暂无题目</div>';
    return;
  }
  el.innerHTML = items.map(function(q, i) {
    var options = [
      { key: 'A', val: q.option_a },
      { key: 'B', val: q.option_b },
      { key: 'C', val: q.option_c },
      { key: 'D', val: q.option_d },
    ].filter(function(o) { return o.val; });
    return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
        '<div style="flex:1">' +
          '<div style="font-weight:600;font-size:14px;margin-bottom:8px">' + (i+1) + '. ' + escapeHtml(q.question_text) + '</div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:13px">' +
            options.map(function(o) {
              var color = o.key === q.correct_answer ? 'var(--success)' : 'var(--muted)';
              return '<div style="color:' + color + '">' + o.key + '. ' + escapeHtml(o.val) + '</div>';
            }).join('') +
          '</div>' +
          '<div style="margin-top:6px;font-size:12px;color:var(--success)">✓ 正确答案：' + q.correct_answer + '</div>' +
        '</div>' +
        '<div style="display:flex;gap:6px;margin-left:12px">' +
          '<button class="btn btn-outline btn-sm" onclick=\'editQuestion(' + JSON.stringify(q).replace(/'/g, "&#39;") + ')\'>编辑</button>' +
          '<button class="btn btn-danger btn-sm" onclick="deleteQuestion(' + q.id + ')">删除</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// Add question
document.getElementById('addQBtn').addEventListener('click', async function() {
  if (isSubmitting) return;
  isSubmitting = true;
  this.disabled = true;
  this.textContent = '保存中...';
  try {
    var isbn = document.getElementById('fIsbn').value.trim();
    var books = await api.get('/admin/api/books?keyword=' + encodeURIComponent(isbn));
    var book = (books.items || []).find(function(b) { return b.isbn === isbn; });
    if (!book) { showToast('未找到该ISBN对应的图书', 'error'); return; }
    await api.post('/admin/api/advancement/questions', {
      book_id: book.id,
      question_text: document.getElementById('fQuestion').value,
      option_a: document.getElementById('fA').value,
      option_b: document.getElementById('fB').value,
      option_c: document.getElementById('fC').value || null,
      option_d: document.getElementById('fD').value || null,
      correct_answer: document.getElementById('fAnswer').value,
      difficulty: parseInt(document.getElementById('fDiff').value),
      explanation: document.getElementById('fExplanation').value || null,
    });
    showToast('题目添加成功');
    document.getElementById('addQModal').classList.remove('show');
  } catch (e) {
    showToast('添加失败: ' + e.message, 'error');
  } finally {
    isSubmitting = false;
    this.disabled = false;
    this.textContent = '保存';
  }
});

// Edit question
function editQuestion(q) {
  document.getElementById('editId').value = q.id;
  document.getElementById('editQuestion').value = q.question_text || '';
  document.getElementById('editA').value = q.option_a || '';
  document.getElementById('editB').value = q.option_b || '';
  document.getElementById('editC').value = q.option_c || '';
  document.getElementById('editD').value = q.option_d || '';
  document.getElementById('editAnswer').value = q.correct_answer || 'A';
  document.getElementById('editDiff').value = q.difficulty || 1;
  document.getElementById('editExplanation').value = q.explanation || '';
  document.getElementById('editQModal').classList.add('show');
}

document.getElementById('saveEditBtn').addEventListener('click', async function() {
  if (isSubmitting) return;
  isSubmitting = true;
  this.disabled = true;
  this.textContent = '保存中...';
  var id = document.getElementById('editId').value;
  try {
    await api.put('/admin/api/advancement/questions/' + id, {
      question_text: document.getElementById('editQuestion').value,
      option_a: document.getElementById('editA').value,
      option_b: document.getElementById('editB').value,
      option_c: document.getElementById('editC').value || null,
      option_d: document.getElementById('editD').value || null,
      correct_answer: document.getElementById('editAnswer').value,
      difficulty: parseInt(document.getElementById('editDiff').value),
      explanation: document.getElementById('editExplanation').value || null,
    });
    showToast('题目更新成功');
    document.getElementById('editQModal').classList.remove('show');
    if (selectedBookId) selectBook(selectedBookId, document.getElementById('selectedBookTitle').textContent, '');
  } catch (e) {
    showToast('更新失败: ' + e.message, 'error');
  } finally {
    isSubmitting = false;
    this.disabled = false;
    this.textContent = '保存';
  }
});

async function deleteQuestion(id) {
  if (!confirm('确认删除此题目？')) return;
  try {
    await api.del('/admin/api/advancement/questions/' + id);
    showToast('删除成功');
    if (selectedBookId) selectBook(selectedBookId, document.getElementById('selectedBookTitle').textContent, '');
  } catch (e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}
</script>
{% endblock %}
