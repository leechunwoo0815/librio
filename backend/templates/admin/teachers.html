{% extends "admin/base.html" %}
{% block title %}老师管理<!-- class alignment refs (hidden) -->
<div style="display:none" class="t1 t2 t3 t4 t5 t6 badge-leave badge-offline badge-online"></div>
{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/admin/css/pages/teachers.css" />
{% endblock %}
{% block page_title %}老师管理{% endblock %}
{% block content %}
<div class="toolbar">
  <div class="toolbar-left">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="搜索老师姓名…" />
    </div>
    <select class="filter-select" id="venueFilter">
      <option value="">全部场馆</option>
    </select>
    <select class="filter-select" id="statusFilter">
      <option value="">全部状态</option>
      <option value="online">在线</option>
      <option value="offline">离线</option>
      <option value="leave">休假中</option>
    </select>
  </div>
  <button class="btn-primary" onclick="openAddModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    添加老师
  </button>
</div>

<div class="teacher-grid" id="teacherGrid">
  <div style="text-align:center;padding:40px;color:var(--muted);grid-column:1/-1">加载中...</div>
</div>

<!-- add teacher modal -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <h2 id="modalTitle">添加老师</h2>
    <form id="addForm" onsubmit="submitTeacher(event)">
      <input type="hidden" id="editId" value="" />
      <div class="form-row">
        <div class="form-group">
          <label>姓名 <span style="color:var(--error)">*</span></label>
          <input type="text" class="form-input" name="name" placeholder="中文名" required />
        </div>
        <div class="form-group">
          <label>英文名</label>
          <input type="text" class="form-input" name="english_name" placeholder="English name" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>所属场馆 <span style="color:var(--error)">*</span></label>
          <select class="form-input" name="venue_id" required>
            <option value="">请选择场馆</option>
          </select>
        </div>
        <div class="form-group">
          <label>职称</label>
          <select class="form-input" name="title">
            <option>阅读顾问</option>
            <option>资深阅读导师</option>
            <option>高级阅读顾问</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>手机号 <span style="color:var(--error)">*</span></label>
        <input type="tel" class="form-input" name="phone" placeholder="用于登录和接收通知" required />
      </div>
      <div class="form-group">
        <label>擅长领域</label>
        <input type="text" class="form-input" name="expertise" placeholder="例如：绘本启蒙、AR 0.5–3.0、亲子阅读" />
      </div>
      <div class="form-group">
        <label>简介</label>
        <textarea class="form-input" name="introduction" rows="3" placeholder="老师个人简介"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeAddModal()">取消</button>
        <button type="submit" class="btn-primary" id="submitBtn">确认添加</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const teacherGrid = document.getElementById('teacherGrid');
  const searchInput = document.getElementById('searchInput');
  const venueFilter = document.getElementById('venueFilter');
  const statusFilter = document.getElementById('statusFilter');

  document.addEventListener('DOMContentLoaded', () => {
    loadTeachers();
    loadVenues();
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadTeachers();
    });
    venueFilter.addEventListener('change', () => loadTeachers());
    statusFilter.addEventListener('change', () => loadTeachers());
  });

  async function loadVenues() {
    try {
      const venues = await api.get('/admin/api/venues');
      const list = venues || [];
      const venueSel = venueFilter;
      const modalSel = document.querySelector('#addForm select[name="venue_id"]');
      list.forEach(v => {
        const o1 = document.createElement('option');
        o1.value = v.id;
        o1.textContent = v.name;
        venueSel.appendChild(o1);
        const o2 = document.createElement('option');
        o2.value = v.id;
        o2.textContent = v.name;
        modalSel.appendChild(o2);
      });
    } catch (err) {
      /* venues load failure is non-blocking */
    }
  }

  async function loadTeachers() {
    try {
      let url = '/admin/api/teachers';
      const params = [];
      const kw = searchInput.value.trim();
      if (kw) params.push('keyword=' + encodeURIComponent(kw));
      const venue = venueFilter.value;
      if (venue) params.push('venue_id=' + venue);
      if (params.length) url += '?' + params.join('&');
      const data = await api.get(url);
      const teachers = data.items || data || [];
      renderTeachers(teachers);
    } catch (err) {
      showToast(err.message || '加载老师列表失败', 'error');
      teacherGrid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--error);grid-column:1/-1">加载失败</div>';
    }
  }

  function getAvatarClass(index) {
    return 't' + ((index % 6) + 1);
  }

  function getInitial(name) {
    if (!name) return '?';
    return name.charAt(0).toUpperCase();
  }

  function getVenueName(teacher) {
    return teacher.venue_name || teacher.venue_id || '';
  }

  function getStatusInfo(teacher) {
    const status = teacher.status || 'online';
    if (status === 'online') return { cls: 'badge-online', text: '在线' };
    if (status === 'offline') return { cls: 'badge-offline', text: '离线' };
    if (status === 'leave') return { cls: 'badge-leave', text: '休假中' };
    return { cls: 'badge-online', text: '在线' };
  }

  function renderTeachers(teachers) {
    if (!teachers.length) {
      teacherGrid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);grid-column:1/-1">暂无老师数据</div>';
      return;
    }
    teacherGrid.innerHTML = teachers.map((t, i) => {
      const st = getStatusInfo(t);
      const venue = getVenueName(t);
      const role = t.title || t.expertise || '阅读顾问';
      const expertise = t.expertise || '';
      const tags = expertise ? expertise.split(/[,，、]/).filter(Boolean) : [];
      return `
        <div class="teacher-card">
          <div class="teacher-header">
            <div class="teacher-avatar ${getAvatarClass(i)}">${escapeHtml(getInitial(t.name))}</div>
            <div class="teacher-meta">
              <div class="teacher-name">${escapeHtml(t.name || '-')}</div>
              <div class="teacher-role">${escapeHtml(venue)}${venue ? ' · ' : ''}${escapeHtml(role)}</div>
            </div>
            <span class="teacher-status-badge ${st.cls}">${st.text}</span>
          </div>
          <div class="teacher-stats">
            <div class="tstat"><div class="tstat-val">${t.student_count || 0}</div><div class="tstat-label">服务学员</div></div>
            <div class="tstat"><div class="tstat-val">${t.rating || '--'}</div><div class="tstat-label">评分</div></div>
            <div class="tstat"><div class="tstat-val">${t.monthly_hours || 0}</div><div class="tstat-label">本月课时</div></div>
          </div>
          <div class="teacher-tags">
            ${tags.map(tag => '<span class="tag">' + escapeHtml(tag.trim()) + '</span>').join('')}
          </div>
          <div class="teacher-actions">
            <button class="action-btn" onclick="editTeacher(${t.id}, '${escapeHtml(t.name || '')}', '${escapeHtml(t.phone || '')}', ${t.venue_id || 0}, '${escapeHtml(t.introduction || '')}', '${escapeHtml(t.expertise || '')}')">编辑</button>
            <button class="action-btn" onclick="viewSchedule(${t.id}, '${escapeHtml(t.name || '')}')">课表</button>
            <button class="action-btn action-btn-danger" onclick="deleteTeacher(${t.id}, '${escapeHtml(t.name || '')}')">删除</button>
          </div>
        </div>`;
    }).join('');
  }

  function openAddModal() {
    document.getElementById('editId').value = '';
    document.getElementById('modalTitle').textContent = '添加老师';
    document.getElementById('submitBtn').textContent = '确认添加';
    document.getElementById('addForm').reset();
    document.getElementById('addModal').classList.add('show');
  }

  function closeAddModal() {
    document.getElementById('addModal').classList.remove('show');
  }

  async function submitTeacher(e) {
    e.preventDefault();
    const form = document.getElementById('addForm');
    const fd = new FormData(form);
    const body = {};
    for (const [k, v] of fd.entries()) {
      if (k === 'editId') continue;
      if (v === '') continue;
      if (k === 'venue_id') {
        body[k] = Number(v);
      } else {
        body[k] = v;
      }
    }
    const editId = document.getElementById('editId').value;
    try {
      if (editId) {
        await api.put('/admin/api/teachers/' + editId, body);
        showToast('老师更新成功');
      } else {
        await api.post('/admin/api/teachers', body);
        showToast('老师添加成功');
      }
      closeAddModal();
      loadTeachers();
    } catch (err) {
      showToast(err.message || '操作失败', 'error');
    }
  }

  function editTeacher(id, name, phone, venueId, introduction, expertise) {
    document.getElementById('editId').value = id;
    document.getElementById('modalTitle').textContent = '编辑老师';
    document.getElementById('submitBtn').textContent = '保存修改';
    const form = document.getElementById('addForm');
    form.elements['name'].value = name;
    form.elements['phone'].value = phone;
    form.elements['venue_id'].value = venueId;
    form.elements['introduction'].value = introduction;
    form.elements['expertise'].value = expertise;
    document.getElementById('addModal').classList.add('show');
  }

  async function deleteTeacher(id, name) {
    showConfirm('删除老师', '确定删除老师"' + name + '"？此操作不可撤销。', async function() {
      try {
        await api.del('/admin/api/teachers/' + id);
        showToast('老师已删除');
        loadTeachers();
      } catch (err) {
        showToast(err.message || '删除失败', 'error');
      }
    });
  }

  async function viewSchedule(teacherId, teacherName) {
    try {
      const data = await api.get('/admin/api/teachers/' + teacherId + '/schedule');
      const schedules = data || [];
      const weekdays = ['', '周一', '周二', '周三', '周四', '周五', '周六', '周日'];
      let html = '<div style="padding:20px">';
      html += '<h3 style="margin-bottom:16px">' + escapeHtml(teacherName) + ' 的课表</h3>';
      if (schedules.length === 0) {
        html += '<p style="color:var(--muted);text-align:center;padding:20px">暂无排班</p>';
      } else {
        html += '<table style="width:100%;border-collapse:collapse">';
        html += '<thead><tr><th style="padding:8px;text-align:left;border-bottom:1px solid var(--border)">星期</th><th style="padding:8px;text-align:left;border-bottom:1px solid var(--border)">开始时间</th><th style="padding:8px;text-align:left;border-bottom:1px solid var(--border)">结束时间</th></tr></thead>';
        html += '<tbody>';
        schedules.forEach(function(s) {
          html += '<tr><td style="padding:8px;border-bottom:1px solid var(--border)">' + (weekdays[s.weekday] || s.weekday) + '</td>';
          html += '<td style="padding:8px;border-bottom:1px solid var(--border)">' + escapeHtml(s.start_time || '-') + '</td>';
          html += '<td style="padding:8px;border-bottom:1px solid var(--border)">' + escapeHtml(s.end_time || '-') + '</td></tr>';
        });
        html += '</tbody></table>';
      }
      html += '</div>';
      showConfirm('课表 - ' + escapeHtml(teacherName), html, null, '关闭');
    } catch (err) {
      showToast('加载课表失败: ' + err.message, 'error');
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
{% endblock %}
