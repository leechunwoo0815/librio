{% extends "admin/base.html" %}
{% block title %}场馆管理{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/admin/css/pages/venues.css" />
{% endblock %}
{% block page_title %}场馆管理{% endblock %}
{% block content %}
<!-- stats -->
<div class="venue-stats" id="venueStats">
  <div class="vstat-card">
    <div class="vstat-label">场馆总数</div>
    <div class="vstat-value" id="statTotal">--</div>
  </div>
  <div class="vstat-card">
    <div class="vstat-label">运营中</div>
    <div class="vstat-value" id="statActive">--</div>
  </div>
  <div class="vstat-card">
    <div class="vstat-label">总工位数</div>
    <div class="vstat-value" id="statStations">--</div>
  </div>
  <div class="vstat-card">
    <div class="vstat-label">本月到馆人次</div>
    <div class="vstat-value" id="statVisits">--</div>
  </div>
</div>

<!-- toolbar -->
<div class="toolbar">
  <div class="toolbar-left">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="搜索场馆名称或地址…" />
    </div>
    <select class="filter-select" id="statusFilter">
      <option value="">全部状态</option>
      <option value="active">运营中</option>
      <option value="maintenance">维护中</option>
      <option value="inactive">已关闭</option>
    </select>
  </div>
  <button class="btn-primary" onclick="openAddModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    新建场馆
  </button>
</div>

<!-- table -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>场馆信息</th>
        <th>联系电话</th>
        <th>工位数</th>
        <th>图书库存</th>
        <th>在借图书</th>
        <th>状态</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="dataBody">
      <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted);">加载中...</td></tr>
    </tbody>
  </table>
  <div class="pagination" id="venuePagination"></div>
</div>

<!-- create venue modal -->
<div class="modal-overlay" id="venueModal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <h2 id="modalTitle">新建场馆</h2>
    <form id="addForm" onsubmit="submitVenue(event)">
      <input type="hidden" id="editId" value="" />
      <div class="form-group">
        <label>场馆名称</label>
        <input type="text" class="form-input" name="name" placeholder="例如：静安馆" required />
      </div>
      <div class="form-group">
        <label>场馆地址</label>
        <input type="text" class="form-input" name="address" placeholder="详细地址" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>联系电话</label>
          <input type="text" class="form-input" name="phone" placeholder="021-XXXX-XXXX" />
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeAddModal()">取消</button>
        <button type="submit" class="btn-primary" id="submitBtn">确认创建</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const dataBody = document.getElementById('dataBody');
  const searchInput = document.getElementById('searchInput');
  const statusFilter = document.getElementById('statusFilter');

  document.addEventListener('DOMContentLoaded', () => {
    loadData();
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadData();
    });
    statusFilter.addEventListener('change', () => loadData());
  });

  async function loadData() {
    try {
      const result = await api.get('/admin/api/venues');
      const list = result.items || result || [];
      renderVenues(list);
      updateStats(list);
    } catch (err) {
      showToast(err.message || '加载场馆列表失败', 'error');
      dataBody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--error);">加载失败</td></tr>';
    }
  }

  function updateStats(venues) {
    document.getElementById('statTotal').textContent = venues.length;
    const activeCount = venues.filter(v => v.status === 'active' || !v.status).length;
    document.getElementById('statActive').textContent = activeCount;
    const totalStations = venues.reduce((sum, v) => sum + (v.station_count || 0), 0);
    document.getElementById('statStations').textContent = totalStations.toLocaleString();
    const totalVisits = venues.reduce((sum, v) => sum + (v.monthly_visits || 0), 0);
    document.getElementById('statVisits').textContent = totalVisits.toLocaleString();
  }

  function getStatusBadge(status) {
    if (status === 'active' || !status) {
      return '<span class="status-badge status-active"><span class="status-dot"></span>运营中</span>';
    }
    if (status === 'maintenance') {
      return '<span class="status-badge status-maintenance"><span class="status-dot"></span>维护中</span>';
    }
    if (status === 'inactive') {
      return '<span class="status-badge status-inactive"><span class="status-dot"></span>已关闭</span>';
    }
    return '<span class="status-badge status-active"><span class="status-dot"></span>' + escapeHtml(status) + '</span>';
  }

  function renderVenues(venues) {
    const kw = searchInput.value.trim().toLowerCase();
    const st = statusFilter.value;
    let filtered = venues;
    if (kw) {
      filtered = filtered.filter(v =>
        (v.name || '').toLowerCase().includes(kw) ||
        (v.address || '').toLowerCase().includes(kw)
      );
    }
    if (st) {
      filtered = filtered.filter(v => (v.status || 'active') === st);
    }
    if (!filtered.length) {
      dataBody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted);">暂无场馆数据</td></tr>';
      document.getElementById('venuePagination').innerHTML = '';
      return;
    }
    dataBody.innerHTML = filtered.map(v => `
      <tr>
        <td>
          <div class="venue-name-cell">
            <div class="venue-icon-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></div>
            <div>
              <div class="venue-name-text">${escapeHtml(v.name || '-')}</div>
              <div class="venue-addr-text">${escapeHtml(v.address || '-')}</div>
            </div>
          </div>
        </td>
        <td>${escapeHtml(v.phone || '-')}</td>
        <td>${v.station_count || '-'}</td>
        <td>${v.book_count != null ? v.book_count.toLocaleString() : '-'}</td>
        <td>${v.borrowed_count != null ? v.borrowed_count.toLocaleString() : '-'}</td>
        <td>${getStatusBadge(v.status)}</td>
        <td>
          <div class="action-btns">
            <button class="action-btn" onclick="editVenue(${v.id}, '${escapeHtml(v.name || '')}', '${escapeHtml(v.address || '')}', '${escapeHtml(v.phone || '')}')">编辑</button>
            <button class="action-btn action-btn-danger" onclick="deleteVenue(${v.id}, '${escapeHtml(v.name || '')}')">删除</button>
          </div>
        </td>
      </tr>
    `).join('');
    document.getElementById('venuePagination').innerHTML =
      '<span class="info">共 ' + filtered.length + ' 个场馆</span><div class="pages"><button class="page-btn active">1</button></div>';
  }

  function openAddModal() {
    document.getElementById('editId').value = '';
    document.getElementById('modalTitle').textContent = '新建场馆';
    document.getElementById('submitBtn').textContent = '确认创建';
    document.getElementById('addForm').reset();
    document.getElementById('venueModal').classList.add('show');
  }

  function editVenue(id, name, address, phone) {
    document.getElementById('editId').value = id;
    document.getElementById('modalTitle').textContent = '编辑场馆';
    document.getElementById('submitBtn').textContent = '保存修改';
    const form = document.getElementById('addForm');
    form.elements['name'].value = name;
    form.elements['address'].value = address;
    form.elements['phone'].value = phone;
    document.getElementById('venueModal').classList.add('show');
  }

  function closeAddModal() {
    document.getElementById('venueModal').classList.remove('show');
  }

  async function submitVenue(e) {
    e.preventDefault();
    const form = document.getElementById('addForm');
    const fd = new FormData(form);
    const body = {};
    for (const [k, v] of fd.entries()) {
      if (k === 'editId') continue;
      if (v === '') continue;
      body[k] = v;
    }
    const editId = document.getElementById('editId').value;
    try {
      if (editId) {
        await api.put('/admin/api/venues/' + editId, body);
        showToast('场馆更新成功');
      } else {
        await api.post('/admin/api/venues', body);
        showToast('场馆创建成功');
      }
      closeAddModal();
      loadData();
    } catch (err) {
      showToast(err.message || '操作失败', 'error');
    }
  }

  async function deleteVenue(id, name) {
    showConfirm('删除场馆', '确定删除场馆"' + name + '"？此操作不可撤销。', async function() {
      try {
        await api.del('/admin/api/venues/' + id);
        showToast('场馆已删除');
        loadData();
      } catch (err) {
        showToast(err.message || '删除失败', 'error');
      }
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
{% endblock %}
