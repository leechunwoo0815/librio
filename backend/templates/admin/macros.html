{% macro modal_overlay(id, title, size='md', title_id='') -%}
<div class="modal-overlay" id="{{ id|e }}">
  <div class="modal modal-sticky modal-{{ size }}">
    <div class="modal-header">
      <h2{% if title_id %} id="{{ title_id }}"{% endif %}>{{ title|e }}</h2>
      <button class="modal-close" data-close-modal="{{ id|e }}" aria-label="关闭"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
{%- endmacro %}

{% macro modal_actions() -%}
    </div>
    <div class="modal-actions">
{%- endmacro %}

{% macro modal_end() -%}
    </div>
  </div>
</div>
{%- endmacro %}
