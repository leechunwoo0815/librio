{% extends "admin/base.html" %}
{% block title %}活动签到{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/admin/css/pages/activity_checkin.css" />
{% endblock %}
{% block page_title %}活动签到{% endblock %}

{% block content %}
<!-- Activity Selector -->
<div class="activity-selector">
  <label>选择活动：</label>
  <select class="filter-select" id="activitySelect" onchange="loadAttendees()">
    <option value="">请选择活动...</option>
  </select>
</div>

<!-- QR Scan -->
<div class="scan-area">
  <input class="scan-input" id="scanInput" type="text" placeholder="扫描或输入签到码..." />
  <button class="btn-confirm" onclick="doSignIn()">确认签到</button>
</div>

<!-- Stats -->
<div class="stats-row">
  <div class="stat-item"><div class="stat-label">已签到</div><div class="stat-value" id="statChecked">0</div></div>
  <div class="stat-item"><div class="stat-label">未签到</div><div class="stat-value" id="statUnchecked">0</div></div>
  <div class="stat-item"><div class="stat-label">总报名</div><div class="stat-value" id="statTotal">0</div></div>
  <div class="progress-wrap">
    <div class="progress-header"><span>签到进度</span><span class="pct" id="progressPct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<!-- Attendee List -->
<div class="table-wrap">
  <table>
    <thead><tr><th>孩子姓名</th><th>状态</th><th>签到时间</th><th>家长手机</th><th>操作</th></tr></thead>
    <tbody id="attendeeBody">
      <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted);">请选择活动查看签到列表</td></tr>
    </tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.addEventListener('DOMContentLoaded', function() { loadActivities(); });

  async function loadActivities() {
    try {
      var data = await api.get('/admin/api/activities');
      var items = data.items || data || [];
      var sel = document.getElementById('activitySelect');
      items.forEach(function(a) {
        var opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = (a.name||'') + '（' + (a.start_time||'').slice(0,10) + '）';
        sel.appendChild(opt);
      });
    } catch (e) {
      // silent
    }
  }

  async function loadAttendees() {
    var activityId = document.getElementById('activitySelect').value;
    if (!activityId) return;
    try {
      var data = await api.get('/admin/api/activities/' + activityId + '/enrollments');
      var items = data.items || data || [];
      renderAttendees(items);
      updateProgress(items);
    } catch (e) {
      document.getElementById('attendeeBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--error);">加载失败</td></tr>';
    }
  }

  function updateProgress(items) {
    var total = items.length;
    var checked = items.filter(function(e) { return e.sign_in_time; }).length;
    var unchecked = total - checked;
    var pct = total > 0 ? Math.round(checked / total * 100) : 0;
    document.getElementById('statChecked').textContent = checked;
    document.getElementById('statUnchecked').textContent = unchecked;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function renderAttendees(items) {
    if (!items.length) {
      document.getElementById('attendeeBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted);">暂无报名记录</td></tr>';
      return;
    }
    document.getElementById('attendeeBody').innerHTML = items.map(function(e) {
      var isChecked = !!e.sign_in_time;
      var statusBadge = isChecked ? '<span class="status-badge status-checked">已签到</span>' : '<span class="status-badge status-unchecked">未签到</span>';
      var time = isChecked ? formatDateTime(e.sign_in_time) : '--';
      var phone = e.parent_phone ? e.parent_phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2') : '--';
      var actions = isChecked
        ? '<span class="action-link" style="color:var(--muted);">--</span>'
        : '<span class="action-link" onclick="manualSignIn(' + e.id + ')">手动签到</span>';
      return '<tr>' +
        '<td>' + escapeHtml(e.child_name || e.child_id || '--') + '</td>' +
        '<td>' + statusBadge + '</td>' +
        '<td style="font-family:var(--font-mono)">' + time + '</td>' +
        '<td style="font-family:var(--font-mono);font-size:12px">' + phone + '</td>' +
        '<td>' + actions + '</td>' +
      '</tr>';
    }).join('');
  }

  async function doSignIn() {
    var code = document.getElementById('scanInput').value.trim();
    if (!code) { showToast('请输入签到码', 'error'); return; }
    try {
      await api.put('/admin/api/enrollments/' + code + '/sign-in');
      showToast('签到成功');
      document.getElementById('scanInput').value = '';
      loadAttendees();
    } catch (e) {
      showToast('签到失败: ' + e.message, 'error');
    }
  }

  async function manualSignIn(enrollId) {
    try {
      await api.put('/admin/api/enrollments/' + enrollId + '/sign-in');
      showToast('手动签到成功');
      loadAttendees();
    } catch (e) {
      showToast('签到失败: ' + e.message, 'error');
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Enter key on scan input
  document.getElementById('scanInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSignIn();
  });
</script>
{% endblock %}
